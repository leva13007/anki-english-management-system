    Front: Це рішення було винайдене для вирішення дуже специфічної проблеми
    Back: This solution was invented to solve a very specific problem.
    Audio: IT_0817-This_solution.mp3
  tags: []
- id: 1781476357209
  fields:
    Front: Ми могли б використати готовий інструмент замість того, щоб винаходити новий
    Back: We could use an existing tool instead of inventing a new one.
    Audio: IT_0818-We_could.mp3
  tags: []
- id: 1781476357210
  fields:
    Front: Іноді найкраще рішення полягає не у винаходженні чогось нового
    Back: Sometimes the best solution is not to invent something new.
    Audio: IT_0819-Sometimes_the.mp3
  tags: []
- id: 1781476357211
  fields:
    Front: Очолювати означає бути відповідальним за команду, проєкт або ініціативу
    Back: To lead means to be responsible for a team, project, or initiative.
    Audio: IT_0820-To_lead.mp3
  tags: []
- id: 1781476357212
  fields:
    Front: Він очолював команду під час міграції системи
    Back: He led the team during the system migration.
    Audio: IT_0821-He_led.mp3
  tags: []
- id: 1781476357213
  fields:
    Front: Хто очолює цей проєкт зараз?
    Back: Who is leading this project now?
    Audio: IT_0822-Who_is.mp3
  tags: []
- id: 1781476357214
  fields:
    Front: Вона очолювала кілька великих технічних ініціатив
    Back: She has led several major technical initiatives.
    Audio: IT_0823-She_has.mp3
  tags: []
- id: 1781476357215
  fields:
    Front: Мені запропонували очолити цей напрямок
    Back: I was asked to lead this initiative.
    Audio: IT_0824-I_was.mp3
  tags: []
- id: 1781476357216
  fields:
    Front: Ефективний лідер повинен вміти приймати складні рішення
    Back: An effective leader must be able to make difficult decisions.
    Audio: IT_0825-An_effective.mp3
  tags: []
- id: 1781476357217
  fields:
    Front: Якби ти очолював команду, що б ти змінив?
    Back: If you led the team, what would you change?
    Audio: IT_0826-If_you.mp3
  tags: []
- id: 1781476357218
  fields:
    Front: Розрізняти означає бачити або пояснювати відмінність між речами
    Back: To distinguish means to see or explain the difference between things.
    Audio: IT_0827-To_distinguish.mp3
  tags: []
- id: 1781476357219
  fields:
    Front: Важливо розрізняти симптом і справжню причину проблеми
    Back: It is important to distinguish the symptom from the actual cause of the problem.
    Audio: IT_0828-It_is.mp3
  tags: []
- id: 1781476357220
  fields:
    Front: Чи можеш ти розрізнити ці два сценарії?
    Back: Can you distinguish these two scenarios?
    Audio: IT_0829-Can_you.mp3
  tags: []
- id: 1781476357221
  fields:
    Front: Багато розробників не можуть чітко розрізнити ці концепції
    Back: Many developers cannot clearly distinguish these concepts.
    Audio: IT_0830-Many_developers.mp3
  tags: []
- id: 1781476357222
  fields:
    Front: Ці два підходи важко розрізнити на перший погляд
    Back: These two approaches are difficult to distinguish at first glance.
    Audio: IT_0831-These_two.mp3
  tags: []
- id: 1781476357223
  fields:
    Front: Ми повинні навчитися розрізняти вимоги та припущення
    Back: We must learn to distinguish requirements from assumptions.
    Audio: IT_0832-We_must.mp3
  tags: []
- id: 1781476357224
  fields:
    Front: Було нелегко розрізнити справжню проблему серед усіх симптомів
    Back: It was not easy to distinguish the real issue among all the symptoms.
    Audio: IT_0833-It_was.mp3
  tags: []
- id: 1781476357225
  fields:
    Front: Покращувати означає робити щось кращим або ефективнішим
    Back: To enhance means to make something better or more effective.
    Audio: IT_0834-To_enhance.mp3
  tags: []
- id: 1781476357226
  fields:
    Front: Ми хочемо покращити продуктивність цього сервісу
    Back: We want to enhance the performance of this service.
    Audio: IT_0835-We_want.mp3
  tags: []
- id: 1781476357227
  fields:
    Front: Останній реліз покращив безпеку системи
    Back: The latest release enhanced system security.
    Audio: IT_0836-The_latest.mp3
  tags: []
- id: 1781476357228
  fields:
    Front: Чи покращить ця зміна користувацький досвід?
    Back: Will this change enhance the user experience?
    Audio: IT_0837-Will_this.mp3
  tags: []
- id: 1781476357229
  fields:
    Front: Ця функція була додана для покращення доступності
    Back: This feature was added to enhance accessibility.
    Audio: IT_0838-This_feature.mp3
  tags: []
- id: 1781476357230
  fields:
    Front: Ми постійно шукаємо способи покращити процес розробки
    Back: We are constantly looking for ways to enhance the development process.
    Audio: IT_0839-We_are.mp3
  tags: []
- id: 1781476357231
  fields:
    Front: Продуктивність була значно покращена після рефакторингу
    Back: Performance was significantly enhanced after the refactoring.
    Audio: IT_0840-Performance_was.mp3
  tags: []
- id: 1781476357232
  fields:
    Front: Розгортання — це процес поступового впровадження нової функції або системи
    Back: A rollout is the process of gradually introducing a new feature or system.
    Audio: IT_0841-A_rollout.mp3
  tags: []
- id: 1781476357233
  fields:
    Front: Розгортання було виконане поетапно
    Back: The rollout was performed in stages.
    Audio: IT_0842-The_rollout.mp3
  tags: []
- id: 1781476357234
  fields:
    Front: Коли заплановане розгортання цієї функції?
    Back: When is the rollout of this feature scheduled?
    Audio: IT_0843-When_is.mp3
  tags: []
- id: 1781476357235
  fields:
    Front: Ми зупинили розгортання після виявлення проблеми
    Back: We stopped the rollout after discovering an issue.
    Audio: IT_0844-We_stopped.mp3
  tags: []
- id: 1781476357236
  fields:
    Front: Успішне розгортання вимагало ретельної підготовки
    Back: A successful rollout required careful preparation.
    Audio: IT_0845-A_successful.mp3
  tags: []
- id: 1781476357237
  fields:
    Front: Під час розгортання не було зафіксовано жодних інцидентів
    Back: No incidents were recorded during the rollout.
    Audio: IT_0846-No_incidents.mp3
  tags: []
- id: 1781476357238
  fields:
    Front: Розгортання вже триває в кількох регіонах
    Back: The rollout is already underway in several regions.
    Audio: IT_0847-The_rollout.mp3
  tags: []
- id: 1781476357239
  fields:
    Front: Переривати означає зупиняти процес або діяльність до її завершення
    Back: To interrupt means to stop a process or activity before it is completed.
    Audio: IT_0848-To_interrupt.mp3
  tags: []
- id: 1781476357240
  fields:
    Front: Мережевий збій перервав процес синхронізації
    Back: A network failure interrupted the synchronization process.
    Audio: IT_0849-A_network.mp3
  tags: []
- id: 1781476357241
  fields:
    Front: Перепрошую, що перебиваю, але маю запитання
    Back: Sorry to interrupt, but I have a question.
    Audio: IT_0850-Sorry_to.mp3
  tags: []
- id: 1781476357242
  fields:
    Front: Ніщо не повинно переривати процес деплою
    Back: Nothing should interrupt the deployment process.
    Audio: IT_0851-Nothing_should.mp3
  tags: []
- id: 1781476357243
  fields:
    Front: Його виступ кілька разів переривали запитаннями
    Back: His presentation was interrupted several times by questions.
    Audio: IT_0852-His_presentation.mp3
  tags: []
- id: 1781476357244
  fields:
    Front: Чи може ця операція бути перервана без ризику?
    Back: Can this operation be interrupted without risk?
    Audio: IT_0853-Can_this.mp3
  tags: []
- id: 1781476357245
  fields:
    Front: Система повинна відновлюватися після перерваних процесів
    Back: The system should recover from interrupted processes.
    Audio: IT_0854-The_system.mp3
  tags: []
- id: 1781476357246
  fields:
    Front: (Синтезувати|об’єднувати в одне ціле) означає поєднувати інформацію з різних джерел в одне
      ціле
    Back: To synthesize means to combine information from different sources into a whole.
    Audio: IT_0855-To_synthesize.mp3
  tags: []
- id: 1781476357247
  fields:
    Front: Ми повинні синтезувати результати кількох досліджень
    Back: We need to synthesize the findings from several studies.
    Audio: IT_0856-We_need.mp3
  tags: []
- id: 1781476357248
  fields:
    Front: Чи можеш ти синтезувати основні висновки з цієї дискусії?
    Back: Can you synthesize the main conclusions from this discussion?
    Audio: IT_0857-Can_you.mp3
  tags: []
- id: 1781476357249
  fields:
    Front: Архітектор синтезував вимоги від кількох команд
    Back: The architect synthesized requirements from several teams.
    Audio: IT_0858-The_architect.mp3
  tags: []
- id: 1781476357250
  fields:
    Front: Цей документ синтезує інформацію з різних джерел
    Back: This document synthesizes information from different sources.
    Audio: IT_0859-This_document.mp3
  tags: []
- id: 1781476357251
  fields:
    Front: Перш ніж приймати рішення, ми синтезували всі доступні дані
    Back: Before making a decision, we synthesized all available data.
    Audio: IT_0860-Before_making.mp3
  tags: []
- id: 1781476357252
  fields:
    Front: Здатність синтезувати складну інформацію є важливою навичкою для ліда
    Back: The ability to synthesize complex information is an important skill for a lead.
    Audio: IT_0861-The_ability.mp3
  tags: []
- id: 1781476357253
  fields:
    Front: Генерувати означає створювати або виробляти щось автоматично або в результаті процесу
    Back: To generate means to create or produce something automatically or as a result of a process.
    Audio: IT_0862-To_generate.mp3
  tags: []
- id: 1781476357254
  fields:
    Front: Система генерує звіт кожної ночі
    Back: The system generates a report every night.
    Audio: IT_0863-The_system.mp3
  tags: []
- id: 1781476357255
  fields:
    Front: Чи можемо ми автоматично генерувати документацію?
    Back: Can we generate the documentation automatically?
    Audio: IT_0864-Can_we.mp3
  tags: []
- id: 1781476357256
  fields:
    Front: Ця зміна згенерувала неочікувані побічні ефекти
    Back: This change generated unexpected side effects.
    Audio: IT_0865-This_change.mp3
  tags: []
- id: 1781476357257
  fields:
    Front: Логи були згенеровані під час виконання задачі
    Back: The logs were generated during task execution.
    Audio: IT_0866-The_logs.mp3
  tags: []
- id: 1781476357258
  fields:
    Front: Модель здатна генерувати код на основі опису
    Back: The model is capable of generating code based on a description.
    Audio: IT_0867-The_model.mp3
  tags: []
- id: 1781476357259
  fields:
    Front: Ми вже згенерували достатньо даних для тестування
    Back: We have already generated enough data for testing.
    Audio: IT_0868-We_have.mp3
  tags: []
