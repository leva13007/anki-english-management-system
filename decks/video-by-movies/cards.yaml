  tags: []
- id: 1763747130181
  fields:
    VideoFilename: sherlok_0570.webm
    Front: We were having a night in
    Back: Ми проводили вечір удома.
  tags: []
- id: 1764782199764
  fields:
    VideoFilename: sherlok_0571.webm
    Front: He was quiet
    Back: Він був тихим.
  tags: []
- id: 1764782199766
  fields:
    VideoFilename: sherlok_0572.webm
    Front: And you&#x27;ve no idea who?
    Back: І ти не маєш жодного уявлення, хто?
  tags: []
- id: 1764782199767
  fields:
    VideoFilename: sherlok_0573.webm
    Front: I'll do my best
    Back: Я зроблю все можливе.
  tags: []
- id: 1764782199768
  fields:
    VideoFilename: sherlok_0574.webm
