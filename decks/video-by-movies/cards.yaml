    Back: Небезпечно робити поспішні висновки.
  tags: []
- id: 1763747130173
  fields:
    VideoFilename: sherlok_0562.webm
    Front: Any change? What for? Cup of tea, of course
    Back: Є якась дрібнота? — Навіщо? — На чашку чаю, звісно.
  tags: []
- id: 1763747130174
  fields:
    VideoFilename: sherlok_0563.webm
    Front: No, I need you to find out all you can about the gallery attendant
