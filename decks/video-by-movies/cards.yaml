  tags: []
- id: 1764782199771
  fields:
    VideoFilename: sherlok_0577.webm
    Front: What&#x27;s he doing sleeping rough?
    Back: Що він робить, сплячи на вулиці?
  tags: []
- id: 1764782199772
  fields:
    VideoFilename: sherlok_0578.webm
    Front: Jupiter, the fifth planet in our solar system, and the largest
    Back: Юпітер, п&#x27;ята планета нашої сонячної системи й найбільша.
  tags: []
- id: 1764782199773
  fields:
    VideoFilename: sherlok_0579.webm
    Front: Discovered by Urbain Le Verrier in eighteen forty-six
    Back: Відкрита Урбеном Левер'є у 1846 році.
  tags: []
- id: 1764782199774
  fields:
    VideoFilename: sherlok_0580.webm
    Front: That painting has been subjected to every test known to science
    Back: Ту картину перевірили всіма відомими науці методами.
  tags: []
- id: 1764782199775
  fields:
    VideoFilename: sherlok_0581.webm
    Front: It's a very good fake, then
    Back: Тоді це дуже хороша підробка.
  tags: []
- id: 1764782199776
  fields:
    VideoFilename: sherlok_0582.webm
    Front: You know about this, don&#x27;t you? This is you, isn&#x27;t it?
    Back: Ти про це знаєш, так? Це твоїх рук діло, так?
  tags: []
- id: 1764782199777
  fields:
    VideoFilename: sherlok_0583.webm
    Front: Inspector, my time is being wasted.
    Back: Інспекторе, ви марнуєте мій час.
  tags: []
- id: 1764782199778
  fields:
    VideoFilename: sherlok_0584.webm
    Front: Would you mind showing yourself and your friends out?
    Back: Не могли б ви вийти самі й забрати своїх друзів?
  tags: []
- id: 1764782199779
  fields:
    VideoFilename: sherlok_0585.webm
    Front: The painting is a fake. I've solved it, I've figured it out
    Back: Картина — підробка. Я розв'язав це, я все зрозумів.
  tags: []
- id: 1764782199780
  fields:
    VideoFilename: sherlok_0586.webm
    Front: That is brilliant, that is gorgeous!
    Back: Це блискуче, це неймовірно!
  tags: []
- id: 1764782199781
  fields:
    VideoFilename: sherlok_0587.webm
    Front: Exploding star. Only appeared in the sky in eighteen fifty-eight
    Back: Вибухаюча зірка. З'явилася на небі лише у 1858 році.
  tags: []
- id: 1764782199782
  fields:
    VideoFilename: sherlok_0588.webm
    Front: Well, criminal conspiracy, fraud, accessory after the fact, at the very least.
    Back: Ну, злочинна змова, шахрайство, співучасть — як мінімум.
  tags: []
- id: 1764782199783
  fields:
    VideoFilename: sherlok_0589.webm
    Front: I found a little old man in Argentina
    Back: Я знайшов одного старенького в Аргентині.
  tags: []
- id: 1764782199784
  fields:
    VideoFilename: sherlok_0590.webm
    Front: Well, nearly anyone
    Back: Ну, майже будь-кого.
  tags: []
- id: 1764782199785
  fields:
    VideoFilename: sherlok_0591.webm
    Front: A spark which he blew into a flame.
    Back: Іскра, яку він роздмухав у полум&#x27;я.
  tags: []
- id: 1764782199786
  fields:
    VideoFilename: sherlok_0592.webm
    Front: And did those whispers have a name?
    Back: І ті шепоти мали ім&#x27;я?
  tags: []
- id: 1764782199787
  fields:
    VideoFilename: sherlok_0593.webm
    Front: Selfish bastards
    Back: Егоїстичні виродки.
  tags: []
- id: 1764782199788
  fields:
    VideoFilename: sherlok_0594.webm
    Front: Well, that&#x27;s one way of looking at it.
    Back: Ну, це один зі способів на це дивитися.
  tags: []
- id: 1764782199789
  fields:
    VideoFilename: sherlok_0595.webm
    Front: There's no blood on the line
    Back: На рейці немає крові.
  tags: []
- id: 1764782199790
  fields:
    VideoFilename: sherlok_0596.webm
    Front: Has it been cleaned off?
    Back: Її стерли?
  tags: []
- id: 1764782199791
  fields:
    VideoFilename: sherlok_0597.webm
    Front: No, there wasn't that much
    Back: Ні, її було небагато.
  tags: []
- id: 1764782199792
  fields:
    VideoFilename: sherlok_0598.webm
    Front: I knew you&#x27;d get there eventually.
    Back: Я знав, що ти зрештою дійдеш до цього.
  tags: []
- id: 1764782199793
  fields:
    VideoFilename: sherlok_0599.webm
    Front: How long have you been following me?
    Back: Як довго ти слідкуєш за мною?
  tags: []
- id: 1764782199794
  fields:
    VideoFilename: sherlok_0600.webm
    Front: He stole the memory stick
    Back: Він украв флешку.
  tags: []
- id: 1764782199795
  fields:
    VideoFilename: sherlok_0601.webm
    Front: It was an accident
    Back: Це був нещасний випадок.
  tags: []
- id: 1764782199796
  fields:
    VideoFilename: sherlok_0602.webm
    Front: I swear it was
    Back: Клянуся, що так.
  tags: []
- id: 1764782199797
  fields:
    VideoFilename: sherlok_0603.webm
    Front: I started dealing drugs
    Back: Я почав продавати наркотики.
  tags: []
- id: 1764782199798
  fields:
    VideoFilename: sherlok_0604.webm
    Front: I mean, the bike thing&#x27;s a great cover, right?
    Back: Ну, доставляти на велосипеді — чудове прикриття, правда?
  tags: []
- id: 1764782199799
  fields:
    VideoFilename: sherlok_0605.webm
    Front: I just got out of my depth
    Back: Я просто зайшов надто далеко.
  tags: []
- id: 1764782199800
  fields:
    VideoFilename: sherlok_0606.webm
    Front: I owed people thousands
    Back: Я був винен людям тисячі.
  tags: []
- id: 1764782199801
  fields:
    VideoFilename: sherlok_0607.webm
    Front: But that night, after a few pints, he really opened up
    Back: Але тієї ночі, після кількох пінт, він справді відкрився.
  tags: []
- id: 1764782199802
  fields:
    VideoFilename: sherlok_0608.webm
    Front: He told me about these missile plans
    Back: Він розповів мені про ці плани ракет.
  tags: []
- id: 1764782199803
  fields:
    VideoFilename: sherlok_0609.webm
    Front: Beyond top secret
    Back: Глибоко засекречені.
  tags: []
- id: 1764782199804
  fields:
    VideoFilename: sherlok_0610.webm
    Front: I was going to call an ambulance
    Back: Я збирався викликати швидку.
  tags: []
- id: 1764782199805
  fields:
    VideoFilename: sherlok_0611.webm
    Front: But it was too late
    Back: Але було вже надто пізно.
  tags: []
- id: 1764782199806
  fields:
    VideoFilename: sherlok_0612.webm
    Front: When a neat little idea popped into your head
    Back: Коли охайна маленька ідея спала тобі на думку.
  tags: []
- id: 1764782199807
  fields:
    VideoFilename: sherlok_0613.webm
    Front: If you wouldn't mind
    Back: Якщо ти не проти.
  tags: []
- id: 1764782199808
  fields:
    VideoFilename: sherlok_0614.webm
    Front: Distraction over, the game continues
    Back: Відволікання закінчено — гра триває.
  tags: []
- id: 1764782199809
  fields:
    VideoFilename: sherlok_0615.webm
    Front: Look at the turn-ups on his jeans!
    Back: Подивись на підкоти на його джинсах!
  tags: []
- id: 1764782199810
  fields:
    VideoFilename: sherlok_0616.webm
    Front: All to distract me from this
    Back: Все це, щоб відволікти мене від цього.
  tags: []
- id: 1764782199811
  fields:
    VideoFilename: sherlok_0617.webm
    Front: This is a turn-up, isn&#x27;t it, Sherlock?
    Back: Це сюрприз, чи не так, Шерлоку?
  tags: []
- id: 1764782199812
  fields:
    VideoFilename: sherlok_0618.webm
    Front: I gave you my number
    Back: Я дав тобі свій номер.
  tags: []
- id: 1764782199813
  fields:
    VideoFilename: sherlok_0619.webm
    Front: I thought you might call
    Back: Я думав, ти можеш зателефонувати.
  tags: []
- id: 1764782199814
  fields:
    VideoFilename: sherlok_0620.webm
    Front: Or are you just pleased to see me?
    Back: Чи ти просто радий мене бачити?
  tags: []
- id: 1764782199815
  fields:
    VideoFilename: sherlok_0621.webm
    Front: Jim from the hospital?
    Back: Джим із лікарні?
  tags: []
- id: 1764782199816
  fields:
    VideoFilename: sherlok_0622.webm
    Front: But then, I suppose, that was rather the point
    Back: Хоча, припускаю, у цьому й був сенс.
  tags: []
- id: 1764782199817
  fields:
    VideoFilename: sherlok_0623.webm
    Front: Don't be silly. Someone else is holding the rifle
    Back: Не будь дурним. Хтось інший тримає рушницю.
  tags: []
- id: 1764782199818
  fields:
    VideoFilename: sherlok_0624.webm
    Front: I don't like getting my hands dirty
    Back: Я не люблю бруднити руки.
  tags: []
- id: 1764782199819
  fields:
    VideoFilename: sherlok_0625.webm
    Front: I&#x27;ve given you a glimpse, Sherlock, just a teensy glimpse
    Back: Я дав тобі проблиск, Шерлоку, лише крихітний проблиск.
  tags: []
- id: 1764782199820
  fields:
    VideoFilename: sherlok_0626.webm
    Front: I&#x27;m a specialist
    Back: Я — спеціаліст.
  tags: []
- id: 1764782199821
  fields:
    VideoFilename: sherlok_0627.webm
    Front: Consulting criminal
    Back: Консультант зі злочинів.
  tags: []
- id: 1764782199822
  fields:
    VideoFilename: sherlok_0628.webm
    Front: No one ever gets to me
    Back: До мене ніхто не добирається.
  tags: []
- id: 1764782199823
  fields:
    VideoFilename: sherlok_0629.webm
    Front: And no one ever will
    Back: І ніхто ніколи не добереться.
  tags: []
- id: 1764782199824
  fields:
    VideoFilename: sherlok_0630.webm
    Front: You've come the closest
    Back: Ти підійшов найближче.
  tags: []
- id: 1764782199825
  fields:
    VideoFilename: sherlok_0631.webm
    Front: Didn't mean it as a compliment. Yes, you did. Yeah, OK, I did
    Back: Не мав на увазі, що це комплімент. — Та мав. — Так, добре, мав.
  tags: []
- id: 1764782199826
  fields:
    VideoFilename: sherlok_0632.webm
    Front: But the flirting's over, Sherlock. Daddy's had enough now
    Back: Але флірт закінчено, Шерлоку. «Татусю» вже досить.
  tags: []
- id: 1764782199827
  fields:
    VideoFilename: sherlok_0633.webm
    Front: I've shown you what I can do
    Back: Я показав тобі, на що здатний.
  tags: []
- id: 1764782199828
  fields:
    VideoFilename: sherlok_0634.webm
    Front: So take this as a friendly warning
    Back: Тож сприйми це як дружнє попередження.
  tags: []
- id: 1764782199829
  fields:
    VideoFilename: sherlok_0635.webm
    Front: Although I have loved this
    Back: Хоч я і насолоджувався цим
  tags: []
- id: 1764782199830
  fields:
    VideoFilename: sherlok_0636.webm
    Front: Did you like the little touch with the underwear?
    Back: Тобі сподобався штришок із білизною?
  tags: []
- id: 1764782199831
  fields:
    VideoFilename: sherlok_0637.webm
    Front: People have died. That&#x27;s what people do!
    Back: Люди померли. Це те, що люди роблять!
  tags: []
- id: 1764782199832
  fields:
    VideoFilename: sherlok_0638.webm
    Front: I will stop you. No, you won't
    Back: Я зупиню тебе. — Ні, не зупиниш.
  tags: []
- id: 1764782199833
  fields:
    VideoFilename: sherlok_0639.webm
    Front: You can talk, Johnny boy. Go ahead
    Back: Ти можеш говорити, Джонні. Давай.
  tags: []
- id: 1764782199834
  fields:
    VideoFilename: sherlok_0640.webm
    Front: The missile plan
    Back: Плани ракет.
  tags: []
- id: 1764782199835
  fields:
    VideoFilename: sherlok_0641.webm
    Front: I could have got them anywhere.
    Back: Я міг отримати їх де завгодно.
  tags: []
- id: 1764782199836
  fields:
    VideoFilename: sherlok_0642.webm
    Front: Westwood. Do you know what happens if you don&#x27;t leave me alone, Sherlock?
    Back: Вествуд. Знаєш, що буде, якщо ти мене не залишиш, Шерлоку?
  tags: []
- id: 1764782199837
  fields:
    VideoFilename: sherlok_0643.webm
    Front: Oh, let me guess. I get killed
    Back: О, дай вгадаю. Мене вб'ють.
  tags: []
- id: 1764782199838
  fields:
    VideoFilename: sherlok_0644.webm
    Front: Don't be obvious. I mean, I'm gonna kill you anyway, some day
    Back: Не будь банальним. Я все одно тебе вб'ю, колись.
  tags: []
- id: 1764782199839
  fields:
    VideoFilename: sherlok_0645.webm
    Front: I don't want to rush it, though
    Back: Але не хочу поспішати.
  tags: []
- id: 1764782199840
  fields:
    VideoFilename: sherlok_0646.webm
    Front: If you don't stop prying, I'll burn you
    Back: Якщо не припиниш нишпорити, я тебе спалю.
  tags: []
- id: 1764782199841
  fields:
    VideoFilename: sherlok_0647.webm
    Front: I'll burn the heart out of you
    Back: Я випалю з тебе серце.
  tags: []
- id: 1764782199842
  fields:
    VideoFilename: sherlok_0648.webm
    Front: I have been reliably informed that I don't have one
    Back: Мені достовірно повідомили, що його в мене немає.
  tags: []
- id: 1764782199843
  fields:
    VideoFilename: sherlok_0649.webm
    Front: But we both know that&#x27;s not quite true.
    Back: Але ми обоє знаємо, що це не зовсім так.
  tags: []
- id: 1764782199844
  fields:
    VideoFilename: sherlok_0650.webm
    Front: Well, I'd better be off
    Back: Ну, мені краще йти.
  tags: []
- id: 1764782199845
  fields:
    VideoFilename: sherlok_0651.webm
    Front: Well, so nice to have had a proper chat.
    Back: Дуже приємно було добре побалакати.
  tags: []
- id: 1764782199846
  fields:
    VideoFilename: sherlok_0652.webm
    Front: What if I was to shoot you now?
    Back: А якщо я зараз тебе застрелю?
  tags: []
- id: 1764782199847
  fields:
    VideoFilename: sherlok_0653.webm
    Front: Then you could cherish the look of surprise on my face.
    Back: Тоді ти міг би цінувати вираз здивування на моєму обличчі.
  tags: []
- id: 1764782199848
  fields:
    VideoFilename: sherlok_0654.webm
    Front: Cos I'd be surprised, Sherlock. Really, I would
    Back: Бо я був би здивований, Шерлоку. Справді був би.
  tags: []
- id: 1764782199849
  fields:
    VideoFilename: sherlok_0655.webm
    Front: And just a teensy bit... disappointed
    Back: І трішечки… розчарований.
  tags: []
- id: 1764782199850
  fields:
    VideoFilename: sherlok_0656.webm
    Front: And of course, you wouldn&#x27;t be able to cherish it for very long.
    Back: І, звісно, ти не зможеш милуватися цим довго.
  tags: []
- id: 1764782199851
  fields:
    VideoFilename: sherlok_0657.webm
    Front: Sorry, boys. I&#x27;m so changeable!
    Back: Вибачте, хлопці. Я такий непостійний!
  tags: []
- id: 1764782199852
  fields:
    VideoFilename: sherlok_0658.webm
    Front: It is a weakness with me, but to be fair to myself, it is my only weakness
    Back: Це моя слабкість, але, якщо бути справедливим до себе, це моя єдина слабкість.
  tags: []
- id: 1764782199853
  fields:
    VideoFilename: sherlok_0659.webm
    Front: You can&#x27;t be allowed to continue.
    Back: Тобі не можна дозволити продовжувати.
  tags: []
- id: 1764782199854
  fields:
    VideoFilename: sherlok_0660.webm
    Front: I would try to convince you
    Back: Я б спробував тебе переконати
  tags: []
- id: 1764782199855
  fields:
    VideoFilename: sherlok_0661.webm
    Front: Everything I have to say has already crossed your mind
    Back: але все, що я можу сказати, вже приходило тобі в голову.
  tags: []
- id: 1764782199856
  fields:
    VideoFilename: sherlok_0662.webm
    Front: Probably my answer has crossed yours
    Back: Мабуть, і моя відповідь приходила в твою.
  tags: []
- id: 1766970674057
  fields:
    VideoFilename: pets_0001.webm
    Front: I've lived in this city all my life. I'm Max
    Back: Я прожив у цьому місті все своє життя. Я Макс.
  tags: []
- id: 1766970674058
  fields:
    VideoFilename: pets_0002.webm
    Front: And I&#x27;m the luckiest dog in New York
    Back: І я — найщасливіший пес у Нью-Йорку.
  tags: []
- id: 1766970674059
  fields:
    VideoFilename: pets_0003.webm
    Front: Well, we have the perfect relationship
    Back: Ну, у нас ідеальні стосунки.
  tags: []
- id: 1766970674060
  fields:
    VideoFilename: pets_0004.webm
    Front: We met a few years ago
    Back: Ми познайомилися кілька років тому.
  tags: []
- id: 1766970674061
  fields:
    VideoFilename: pets_0005.webm
    Front: And, boy, let me tell ya, we got along right away
    Back: І, повір, ми одразу порозумілися.
  tags: []
- id: 1766970674062
  fields:
    VideoFilename: pets_0006.webm
    Front: She was looking for a roommate. And so was I!
    Back: Вона шукала сусіда по квартирі. І я теж!
  tags: []
- id: 1766970674063
  fields:
    VideoFilename: pets_0007.webm
    Front: So I just moved in that same day
    Back: Тож я просто переїхав того ж дня.
  tags: []
- id: 1766970674064
  fields:
    VideoFilename: pets_0008.webm
    Front: We've been together ever since
    Back: Відтоді ми завжди разом.
  tags: []
- id: 1766970674065
  fields:
    VideoFilename: pets_0009.webm
    Front: Katie would do anything for me
    Back: Кеті зробила б для мене що завгодно.
  tags: []
- id: 1766970674066
  fields:
    VideoFilename: pets_0010.webm
    Front: And I'm her loyal protector
    Back: А я — її вірний захисник.
  tags: []
- id: 1766970674067
  fields:
    VideoFilename: pets_0011.webm
    Front: Us against the world
    Back: Ми проти всього світу.
  tags: []
- id: 1766970674068
  fields:
    VideoFilename: pets_0012.webm
    Front: There's just one little problem
    Back: Є лише одна маленька проблема.
  tags: []
- id: 1766970674069
  fields:
    VideoFilename: pets_0013.webm
    Front: Pretty much every day
    Back: Майже щодня…
  tags: []
- id: 1766970674070
  fields:
    VideoFilename: pets_0014.webm
    Front: I'll see you tonight
    Back: Побачимось сьогодні ввечері.
  tags: []
- id: 1766970674071
  fields:
    VideoFilename: pets_0015.webm
    Front: Sometimes I try stuff to get her to stay
    Back: Іноді я вигадую щось, щоб вона залишилась.
  tags: []
- id: 1766970674072
  fields:
    VideoFilename: pets_0016.webm
    Front: That's a good boy
    Back: Оце хороший хлопчик.
  tags: []
- id: 1766970674073
  fields:
    VideoFilename: pets_0017.webm
    Front: But it never works
    Back: Але це ніколи не працює.
  tags: []
- id: 1766970674074
  fields:
    VideoFilename: pets_0018.webm
    Front: Where is she going?
    Back: Куди вона йде?
  tags: []
- id: 1766970674075
  fields:
    VideoFilename: pets_0019.webm
    Front: What could she possibly be doing?
    Back: Що вона взагалі може робити?
  tags: []
- id: 1766970674076
  fields:
    VideoFilename: pets_0020.webm
    Front: Oh, I miss her so much
    Back: Ох, я так за нею сумую.
  tags: []
- id: 1766970674077
  fields:
    VideoFilename: pets_0021.webm
    Front: Any plans today?
    Back: Є плани на сьогодні?
  tags: []
- id: 1766970674078
  fields:
    VideoFilename: pets_0022.webm
    Front: Oh, that sounds exciting
    Back: О, звучить захопливо.
  tags: []
- id: 1766970674079
  fields:
    VideoFilename: pets_0023.webm
    Front: Well, I won't interrupt
    Back: Ну, я не буду заважати.
  tags: []
- id: 1766970674080
  fields:
    VideoFilename: pets_0024.webm
    Front: I've got a very busy day, too
    Back: У мене теж дуже насичений день.
  tags: []
- id: 1766970674081
  fields:
    VideoFilename: pets_0025.webm
    Front: Do you ever wonder where they go during the day?
    Back: Ти коли-небудь замислювався, куди вони йдуть удень?
  tags: []
- id: 1766970674082
  fields:
    VideoFilename: pets_0026.webm
    Front: I don't really care
    Back: Мені, чесно кажучи, байдуже.
  tags: []
- id: 1766970674083
  fields:
    VideoFilename: pets_0027.webm
    Front: Whatever you need to tell yourself
    Back: Кажи собі що хочеш.
  tags: []
- id: 1766970674084
  fields:
    VideoFilename: pets_0028.webm
    Front: What&#x27;s up, Sweetpea?
    Back: Як справи, Сонечко?
  tags: []
- id: 1766970674085
  fields:
    VideoFilename: pets_0029.webm
    Front: Hey, Mel, where've you been, man?
    Back: Гей, Мел, де ти був, друже?
  tags: []
- id: 1766970674086
  fields:
    VideoFilename: pets_0030.webm
    Front: Last Sunday, my owner feeds me a small white pill, right?
    Back: Минулої неділі мій господар дав мені маленьку білу пігулку, так?
  tags: []
- id: 1766970674087
  fields:
    VideoFilename: pets_0031.webm
    Front: I start to feel a little groggy.
    Back: Я починаю відчувати себе трохи загальмованим.
  tags: []
- id: 1766970674088
  fields:
    VideoFilename: pets_0032.webm
    Front: The next thing I know, I wake up, I&#x27;m in the sky!
    Back: І наступне, що пам&#x27;ятаю — прокидаюся, а я в небі!
  tags: []
- id: 1766970674089
  fields:
    VideoFilename: pets_0033.webm
    Front: So, I pass out from fear, and when I wake up. I'm in Florida.
    Back: Я знепритомнів від страху, а коли прокинувся — я у Флориді.
  tags: []
- id: 1766970674090
  fields:
    VideoFilename: pets_0034.webm
    Front: I will never eat a pill like that again
    Back: Я більше ніколи не з'їм таку пігулку.
  tags: []
- id: 1766970674091
  fields:
    VideoFilename: pets_0035.webm
    Front: Because, I mean, come on! Right? It&#x27;s peanut butter!
    Back: Бо, ну серйозно! Це ж арахісове масло!
  tags: []
- id: 1766970674092
  fields:
    VideoFilename: pets_0036.webm
    Front: You still looking for your apartment?
    Back: Ти все ще шукаєш квартиру?
  tags: []
- id: 1766970674093
  fields:
    VideoFilename: pets_0037.webm
    Front: Is this the second or the third floor?
    Back: Це другий чи третій поверх?
  tags: []
- id: 1766970674094
  fields:
    VideoFilename: pets_0038.webm
    Front: I don't know any numbers, but, you don't live here.
    Back: Я не знаю чисел, але, ти тут не живеш.
  tags: []
- id: 1766970674095
  fields:
    VideoFilename: pets_0039.webm
    Front: Katie&#x27;s gonna be so excited!
    Back: Кеті буде так рада!
  tags: []
- id: 1766970674096
  fields:
    VideoFilename: pets_0040.webm
    Front: I'm so psyched to see you too, buddy
    Back: Я теж дуже радий тебе бачити, друже.
  tags: []
- id: 1766970674097
  fields:
    VideoFilename: pets_0041.webm
    Front: I know this&#x27;ll take some getting used to, but…
    Back: Я знаю, до цього доведеться звикнути, але…
  tags: []
- id: 1766970674098
  fields:
    VideoFilename: pets_0042.webm
    Front: Take a look around
    Back: Озирнись довкола.
  tags: []
- id: 1766970674099
  fields:
    VideoFilename: pets_0043.webm
    Front: This is a lot to take in
    Back: Це дуже багато, щоб одразу все сприйняти.
  tags: []
- id: 1766970674100
  fields:
    VideoFilename: pets_0044.webm
    Front: So you and I are gonna have to take care of him
    Back: Отже, нам з тобою доведеться про нього подбати.
  tags: []
- id: 1766970674101
  fields:
    VideoFilename: pets_0045.webm
    Front: Sleep tight, boys
    Back: Спіть міцно, хлопці.
  tags: []
- id: 1766970674102
  fields:
    VideoFilename: pets_0046.webm
    Front: By the way, that is, that is one gorgeous bed
    Back: До речі… це… це просто розкішне ліжко.
  tags: []
- id: 1766970674103
  fields:
    VideoFilename: pets_0047.webm
    Front: Maybe we could share?
    Back: Може, поділимося?
  tags: []
- id: 1766970674104
  fields:
    VideoFilename: pets_0048.webm
    Front: You know, one night you get the bed. The next night, I do
    Back: Ну знаєш, одну ніч — тобі ліжко, наступну — мені.
  tags: []
- id: 1766970674105
  fields:
    VideoFilename: pets_0049.webm
    Front: You are stubborn
    Back: Ти впертий.
  tags: []
- id: 1766970674106
  fields:
    VideoFilename: pets_0050.webm
    Front: But we gotta learn to get along
    Back: Але нам треба навчитися ладнати.
  tags: []
- id: 1767900579324
  fields:
    VideoFilename: pets_0051.webm
    Front: I'm comfy
    Back: Мені зручно.
  tags: []
- id: 1767900579325
  fields:
    VideoFilename: pets_0052.webm
    Front: It's an emergency that you get rid of this dog
    Back: Це надзвичайна ситуація — ти маєш позбутися цього собаки.
  tags: []
- id: 1767900579326
  fields:
    VideoFilename: pets_0053.webm
    Front: And he's scary, and he's frightening, and he's the death of all good things.
    Back: І він страшний, і лякаючий, і кінець усьому доброму.
  tags: []
- id: 1767900579327
  fields:
    VideoFilename: pets_0054.webm
    Front: Are you trying to get rid of me?
    Back: Ти намагаєшся від мене позбутися?
  tags: []
- id: 1767900579328
  fields:
    VideoFilename: pets_0055.webm
    Front: I'd like to know how much you heard
    Back: Я хотів би знати, скільки ти чув.
  tags: []
- id: 1767900579329
  fields:
    VideoFilename: pets_0056.webm
    Front: So, that's how it's gonna be, huh?
    Back: Отже, так воно й буде, га?
  tags: []
- id: 1767900579330
  fields:
    VideoFilename: pets_0057.webm
    Front: And when I get angry, I do this
    Back: А коли я злюся, я роблю ось так.
  tags: []
- id: 1767900579331
  fields:
    VideoFilename: pets_0058.webm
    Front: And if it's gonna come down to you or me...
    Back: І якщо доведеться обирати між тобою і мною…
  tags: []
- id: 1767900579332
  fields:
    VideoFilename: pets_0059.webm
    Front: Chloe! I got a bad situation
    Back: Хлоя! У мене погана ситуація.
  tags: []
- id: 1767900579333
  fields:
    VideoFilename: pets_0060.webm
    Front: Katie brought home a new dog from the pound
    Back: Кеті принесла додому нового собаку з притулку.
  tags: []
- id: 1767900579334
  fields:
    VideoFilename: pets_0061.webm
    Front: I'm sleeping on the floor, like a dog
    Back: Я сплю на підлозі, як собака.
  tags: []
- id: 1767900579335
  fields:
    VideoFilename: pets_0062.webm
    Front: Why would Katie do this to me?
    Back: Навіщо Кеті так зі мною вчинила?
  tags: []
- id: 1767900579336
  fields:
    VideoFilename: pets_0063.webm
    Front: Dog people do weird, inexplicable things
    Back: Собачники роблять дивні, незрозумілі речі.
  tags: []
- id: 1767900579337
  fields:
    VideoFilename: pets_0064.webm
    Front: I don't know, maybe we could institute some ground rules
    Back: Не знаю, може, ми могли б установити якісь базові правила.
  tags: []
- id: 1767900579338
  fields:
    VideoFilename: pets_0065.webm
    Front: Katie's gonna be so upset when she sees that
    Back: Кеті буде так засмучена, коли вона це побачить.
  tags: []
- id: 1767900579339
  fields:
    VideoFilename: pets_0066.webm
    Front: When she sees how you trashed her whole place
    Back: Коли вона побачить, як ти розніс усю її квартиру.
  tags: []
- id: 1767900579340
  fields:
    VideoFilename: pets_0067.webm
    Front: Oh, that's a shame
    Back: О, яка шкода.
  tags: []
- id: 1767900579341
  fields:
    VideoFilename: pets_0068.webm
    Front: Bite me? Rip my face off?
    Back: Вкусити мене? Відірвати мені обличчя?
  tags: []
- id: 1767900579342
  fields:
    VideoFilename: pets_0069.webm
    Front: Who's your new roommate?
    Back: Хто твій новий сусід по квартирі?
  tags: []
- id: 1767900579343
  fields:
    VideoFilename: pets_0070.webm
    Front: Your hat is the best hat I've ever seen
    Back: Твій капелюх — найкращий капелюх, який я коли-небудь бачив.
  tags: []
- id: 1767900579344
  fields:
    VideoFilename: pets_0071.webm
    Front: You forgot my leash
    Back: Ти забув мій повідець.
  tags: []
- id: 1767900579345
  fields:
    VideoFilename: pets_0072.webm
    Front: Be a good lad and bring me a stick, won't you?
    Back: Будь хорошим хлопчиком і принеси мені палицю, гаразд?
  tags: []
- id: 1767900579346
  fields:
    VideoFilename: pets_0073.webm
    Front: You heard me. Fetch
    Back: Ти мене почув. Апорт.
  tags: []
- id: 1767900579347
  fields:
    VideoFilename: pets_0074.webm
    Front: That one doesn't please me
    Back: Цей мені не до вподоби.
  tags: []
- id: 1767900579348
  fields:
    VideoFilename: pets_0075.webm
    Front: You should come over and look at them
    Back: Тобі варто підійти й подивитися на них.
  tags: []
- id: 1767900579349
  fields:
    VideoFilename: pets_0076.webm
    Front: So long!
    Back: Бувай!
  tags: []
- id: 1767900579350
  fields:
    VideoFilename: pets_0077.webm
    Front: No hard feelings!
    Back: Без образ!
  tags: []
- id: 1767900579351
  fields:
    VideoFilename: pets_0078.webm
    Front: What's going on here?
    Back: Що тут відбувається?
  tags: []
- id: 1767900579352
  fields:
    VideoFilename: pets_0079.webm
    Front: Mind your own business. Oh, my gosh, what happened to you?
    Back: Займайся своїми справами. Боже мій, що з тобою сталося?
  tags: []
- id: 1767900579353
  fields:
    VideoFilename: pets_0080.webm
    Front: Oh, you're headed into dangerous territory there, kitty-cat.
    Back: О, ти зараз заходиш на небезпечну територію, котику.
  tags: []
- id: 1767900579354
  fields:
    VideoFilename: pets_0081.webm
    Front: I'd watch your tone, sunshine
    Back: Я б стежив за тоном, сонечко.
  tags: []
- id: 1767900579355
  fields:
    VideoFilename: pets_0082.webm
    Front: You wanna start with me, low raisin?
    Back: Хочеш почати зі мною, малий родзинко?
  tags: []
- id: 1767900579356
  fields:
    VideoFilename: pets_0083.webm
    Front: I just remembered I gotta be somewhere!
    Back: Я щойно згадав, що мені треба бути в іншому місці!
  tags: []
- id: 1767900579357
  fields:
    VideoFilename: pets_0084.webm
    Front: Two, four, six, eight
    Back: Два, чотири, шість, вісім…
  tags: []
- id: 1767900579358
  fields:
    VideoFilename: pets_0085.webm
    Front: I would not fetch that. I'm old-school
    Back: Я це не апортую. Я старої школи.
  tags: []
- id: 1767900579359
  fields:
    VideoFilename: pets_0086.webm
    Front: I can't go to the pound
    Back: Я не можу повернутися до притулку.
  tags: []
- id: 1767900579360
  fields:
    VideoFilename: pets_0087.webm
    Front: She just got me out of the pound
    Back: Вона щойно забрала мене з притулку.
  tags: []
- id: 1767900579361
  fields:
    VideoFilename: pets_0088.webm
    Front: What's the matter, Maria?
    Back: Що сталося, Маріє?
  tags: []
- id: 1767900579362
  fields:
    VideoFilename: pets_0089.webm
    Front: I cannot bear another moment without knowing!
    Back: Я не можу витримати й миті, не знаючи!
  tags: []
- id: 1767900579363
  fields:
    VideoFilename: pets_0090.webm
    Front: Hey, I see you, squirrel!
    Back: Гей, я тебе бачу, білко!
  tags: []
- id: 1768423872953
  fields:
    VideoFilename: pets_0091.webm
    Front: Nobody likes you, squirrels!
    Back: Ніхто вас не любить, білки!
  tags: []
- id: 1768423872954
  fields:
    VideoFilename: pets_0092.webm
    Front: Guys, seriously, where is Max?
    Back: Народ, серйозно, де Макс?
  tags: []
- id: 1768423872955
  fields:
    VideoFilename: pets_0093.webm
    Front: Yeah, give me a second
    Back: Так, дай мені секунду.
  tags: []
- id: 1768423872956
  fields:
    VideoFilename: pets_0094.webm
    Front: Whatcha doing in the middle of the road?
    Back: Що ти робиш посеред дороги?
  tags: []
- id: 1768423872957
  fields:
    VideoFilename: pets_0095.webm
    Front: Ripper! Ripper, where you at?
    Back: Ріппере! Ріппере, де ти?
  tags: []
- id: 1768423872958
  fields:
    VideoFilename: pets_0096.webm
    Front: I&#x27;m busting you outta here!
    Back: Я витягну тебе звідси!
  tags: []
- id: 1768423872959
  fields:
    VideoFilename: pets_0097.webm
    Front: Thrown away by our owners
    Back: Викинуті нашими господарями.
  tags: []
- id: 1768423872960
  fields:
    VideoFilename: pets_0098.webm
    Front: I don't think so, pets
    Back: Я так не думаю, домашні улюбленці.
  tags: []
- id: 1768423872961
  fields:
    VideoFilename: pets_0099.webm
    Front: You chose your side. And now you&#x27;re gonna burn.
    Back: Ви обрали свій бік. І тепер ви згорите.
  tags: []
- id: 1768423872962
  fields:
    VideoFilename: pets_0100.webm
    Front: I ain&#x27;t no pet! You got it all wrong!
    Back: Я не якийсь там улюбленець! Ти все неправильно зрозумів!
  tags: []
- id: 1768423872963
  fields:
    VideoFilename: pets_0101.webm
    Front: Wait a minute, that&#x27;s too far maybe?
    Back: Зачекай, може, це вже занадто?
  tags: []
- id: 1768423872964
  fields:
    VideoFilename: pets_0102.webm
    Front: No, they dig it
    Back: Ні, їм це подобається.
  tags: []
- id: 1768423872965
  fields:
    VideoFilename: pets_0103.webm
    Front: Oh, man, you remind me of my boy, Ricky.
    Back: Чувак, ти нагадуєш мені мого хлопця, Рікі.
  tags: []
- id: 1768423872966
  fields:
    VideoFilename: pets_0104.webm
    Front: What are y'all waiting for? I'm not playing
    Back: Чого ви чекаєте? Я не жартую.
  tags: []
- id: 1768423872967
  fields:
    VideoFilename: pets_0105.webm
    Front: Long live the revolution, suckers!
    Back: Хай живе революція, лузери!
  tags: []
- id: 1768423872968
  fields:
    VideoFilename: pets_0106.webm
    Front: Looks like you could use a little help
    Back: Схоже, тобі не завадить невелика допомога.
  tags: []
- id: 1768423872969
  fields:
    VideoFilename: pets_0107.webm
    Front: Who said that?
    Back: Хто це сказав?
  tags: []
- id: 1768423872970
  fields:
    VideoFilename: pets_0108.webm
    Front: In this dark and foreboding shed
    Back: У цьому темному й моторошному сараї.
  tags: []
- id: 1768423872971
  fields:
    VideoFilename: pets_0109.webm
    Front: If you let me out, I'll find your friend
    Back: Якщо ти мене випустиш, я знайду твого друга.
  tags: []
- id: 1768423872972
  fields:
    VideoFilename: pets_0110.webm
    Front: Oh! You're so sweet
    Back: О! Ти такий милий.
  tags: []
- id: 1768423872973
  fields:
    VideoFilename: pets_0111.webm
    Front: Just step over the pile of bones
    Back: Просто переступи через купу кісток.
  tags: []
- id: 1768423872974
  fields:
    VideoFilename: pets_0112.webm
    Front: You know what I meant
    Back: Ти знаєш, що я мав на увазі.
  tags: []
- id: 1768423872975
  fields:
    VideoFilename: pets_0113.webm
    Front: You should be sorry. You deserve to be locked up
    Back: Тобі має бути соромно. Ти заслуговуєш бути замкненим.
  tags: []
- id: 1768423872976
  fields:
    VideoFilename: pets_0114.webm
    Front: I can't help it. I was born with killer instincts
    Back: Я нічого не можу з цим зробити. Я народився з інстинктами вбивці.
  tags: []
- id: 1768423872977
  fields:
    VideoFilename: pets_0115.webm
    Front: That is just no excuse
    Back: Це зовсім не виправдання.
  tags: []
- id: 1768423872978
  fields:
    VideoFilename: pets_0116.webm
    Front: I'm a selfish predator
    Back: Я егоїстичний хижак.
  tags: []
- id: 1768423872979
  fields:
    VideoFilename: pets_0117.webm
    Front: It's no wonder I have no friends
    Back: Не дивно, що в мене немає друзів.
  tags: []
- id: 1768423872980
  fields:
    VideoFilename: pets_0118.webm
    Front: Please, take off the chain
    Back: Будь ласка, зніми ланцюг.
  tags: []
- id: 1768423872981
  fields:
    VideoFilename: pets_0119.webm
    Front: Tiberius. This is gonna sound completely horrible, but, um.
    Back: Тіберію. Це прозвучить жахливо, але, е-е…
  tags: []
- id: 1768423872982
  fields:
    VideoFilename: pets_0120.webm
    Front: I don't fully trust you
    Back: Я тобі не повністю довіряю.
  tags: []
- id: 1768423872983
  fields:
    VideoFilename: pets_0121.webm
    Front: I guess everyone deserves a second chance
    Back: Думаю, кожен заслуговує на другий шанс.
  tags: []
- id: 1768423872984
  fields:
    VideoFilename: pets_0122.webm
    Front: And you are just a lonely, old bird
    Back: А ти просто самотній, старий птах.
  tags: []
- id: 1768423872985
  fields:
    VideoFilename: pets_0123.webm
    Front: So, what does this Max look like?
    Back: То як виглядає цей Макс?
  tags: []
- id: 1768423872986
  fields:
    VideoFilename: pets_0124.webm
    Front: He's a short-hair, roguishly handsome
    Back: Він короткошерстий, зухвало привабливий.
  tags: []
- id: 1768423872987
  fields:
    VideoFilename: pets_0125.webm
    Front: The leader does not recite the password.
    Back: Лідер не промовляє пароль.
  tags: []
- id: 1768423872988
  fields:
    VideoFilename: pets_0126.webm
    Front: Guys, I want you to tell them how you did it
    Back: Хлопці, я хочу, щоб ви розповіли їм, як ви це зробили.
  tags: []
- id: 1768423872989
  fields:
    VideoFilename: pets_0127.webm
    Front: We love gory detail, here
    Back: Ми тут любимо криваві подробиці.
  tags: []
- id: 1768423872990
  fields:
    VideoFilename: pets_0128.webm
    Front: That story bored me to death
    Back: Ця історія мене смертельно занудила.
  tags: []
- id: 1768423872991
  fields:
    VideoFilename: pets_0129.webm
    Front: Was it a blender?
    Back: Це був блендер?
  tags: []
- id: 1768423872992
  fields:
    VideoFilename: pets_0130.webm
    Front: Everybody else need a pep talk
    Back: Усім іншим потрібна мотиваційна промова.
  tags: []
- id: 1768423872993
  fields:
    VideoFilename: pets_0131.webm
    Front: I was a magician's rabbit for kids' parties
    Back: Я був кроликом фокусника на дитячих вечірках.
  tags: []
- id: 1768423872994
  fields:
    VideoFilename: pets_0132.webm
    Front: The trainees used to practice on me!
    Back: Стажери тренувалися на мені!
  tags: []
- id: 1768423872995
  fields:
    VideoFilename: pets_0133.webm
    Front: Until they ran out of space!
    Back: Поки в них не скінчилося місце!
  tags: []
- id: 1768423872996
  fields:
    VideoFilename: pets_0134.webm
    Front: I mean, yes, humans say they love us
    Back: Ну так, люди кажуть, що люблять нас.
  tags: []
- id: 1768423872997
  fields:
    VideoFilename: pets_0135.webm
    Front: But then they turn around and throw us out like garbage.
    Back: А потім розвертаються й викидають нас, як сміття.
  tags: []
- id: 1769110839895
  fields:
    VideoFilename: pets_0136.webm
    Front: Hey, it's not our fault we don't look like the ad!
    Back: Це не наша вина, що ми не виглядаємо як у рекламі!
  tags: []
- id: 1769110839896
  fields:
    VideoFilename: pets_0137.webm
    Front: You guys are joining the brotherhood
    Back: Ви, хлопці, приєднуєтеся до братства.
  tags: []
- id: 1769110839897
  fields:
    VideoFilename: pets_0138.webm
    Front: It&#x27;s initiation time!
    Back: Час посвяти!
  tags: []
- id: 1769110839898
  fields:
    VideoFilename: pets_0139.webm
    Front: I ain&#x27;t saying nothing!
    Back: Я нічого не скажу!
  tags: []
- id: 1769110839899
  fields:
    VideoFilename: pets_0140.webm
    Front: Is this supposed to scare me?
    Back: Це має мене налякати?
  tags: []
- id: 1769110839900
  fields:
    VideoFilename: pets_0141.webm
    Front: Does it always happen? Cause your head looks like it's taken a lot of landings
    Back: Це завжди так трапляється? Бо виглядає, ніби твоя голова пережила багато приземлень.
  tags: []
- id: 1769110839901
  fields:
    VideoFilename: pets_0142.webm
    Front: Do you want me to catch ya? Cos I'll  catch ya this way and that you'll look like a waffle.
    Back: Хочеш, я тебе вдарю? Я побʼю тебе таким чином що будеш як вафля.
  tags: []
- id: 1769110839902
  fields:
    VideoFilename: pets_0143.webm
    Front: Okay. He's too stupid to talk, and too ugly to eat
    Back: Гаразд. Він занадто дурний, щоб говорити, і занадто потворний, щоб його їсти.
  tags: []
- id: 1769110839903
  fields:
    VideoFilename: pets_0144.webm
    Front: I&#x27;m done playing nice!
    Back: Я закінчив гратися в хорошого!
  tags: []
- id: 1769110839904
  fields:
    VideoFilename: pets_0145.webm
    Front: Don&#x27;t look at him. Look at me. Nobody can help you!
    Back: Не дивись на нього. Дивись на мене. Ніхто тобі не допоможе!
  tags: []
- id: 1769110839905
  fields:
    VideoFilename: pets_0146.webm
    Front: He&#x27;s in the sewers! He got taken!
    Back: Він у каналізації! Його забрали!
  tags: []
- id: 1769110839906
  fields:
    VideoFilename: pets_0147.webm
    Front: Please! Have mercy. Adorable puffy dog!
    Back: Будь ласка! Помилуй. чарівний пухнастий песику!
  tags: []
- id: 1769110839907
  fields:
    VideoFilename: pets_0148.webm
    Front: Can I call you "Tiny Dog"?
    Back: Можна я називатиму тебе «Крихітний Пес»?
  tags: []
- id: 1769110839908
  fields:
    VideoFilename: pets_0149.webm
    Front: It fits you. Let&#x27;s admit that.
    Back: Тобі личить. Давай визнаємо це.
  tags: []
- id: 1769110839909
  fields:
    VideoFilename: pets_0150.webm
    Front: Between you and the fat dog, I like you the best.
    Back: Між тобою і товстим псом ти мені подобаєшся більше.
  tags: []
- id: 1769110839910
  fields:
    VideoFilename: pets_0151.webm
    Front: Tiny Dog does not want to go first. Take the fat dog!
    Back: Крихітний Пес не хоче йти першим. Забирайте товстого пса!
  tags: []
- id: 1769110839911
  fields:
    VideoFilename: pets_0152.webm
    Front: Domestics?
    Back: Домашні?
  tags: []
- id: 1769110839912
  fields:
    VideoFilename: pets_0153.webm
    Front: You said you burned your collars
    Back: Ти сказав, що спалив свої нашийники.
  tags: []
- id: 1769110839913
  fields:
    VideoFilename: pets_0154.webm
    Front: You don't deserve to be marked by the Viper
    Back: Ти не заслуговуєш бути позначеним Гадюкою.
  tags: []
- id: 1769110839914
  fields:
    VideoFilename: pets_0155.webm
    Front: Uh, fellas, that was an accident
    Back: Е-е, хлопці, це було випадково.
  tags: []
- id: 1769110839915
  fields:
    VideoFilename: pets_0156.webm
    Front: You ain&#x27;t never did nothing to nobody!
    Back: Ти ніколи нічого нікому не зробив!
  tags: []
- id: 1769110839916
  fields:
    VideoFilename: pets_0157.webm
    Front: We&#x27;re sorry. Can this be over now?
    Back: Нам шкода. Можна вже з цим закінчити?
  tags: []
- id: 1769110839917
  fields:
    VideoFilename: pets_0158.webm
    Front: Which one do you mean at this moment?
    Back: Якого саме ти маєш на увазі зараз?
  tags: []
- id: 1769110839918
  fields:
    VideoFilename: pets_0159.webm
    Front: The squirrels are gonna take over the world!
    Back: Білки захоплять світ!
  tags: []
- id: 1769110839919
  fields:
    VideoFilename: pets_0160.webm
    Front: We have got to find him and bring him home!
    Back: Ми повинні знайти його і повернути додому!
  tags: []
- id: 1769110839920
  fields:
    VideoFilename: pets_0161.webm
    Front: But the outside world is loud and scary
    Back: Але зовнішній світ гучний і страшний.
  tags: []
- id: 1769110839921
  fields:
    VideoFilename: pets_0162.webm
    Front: Is that a hawk?
    Back: Це яструб?
  tags: []
- id: 1769110839922
  fields:
    VideoFilename: pets_0163.webm
    Front: Come on, girl, Max doesn't even know you're alive
    Back: Та годі, дівчинко, Макс навіть не знає, що ти існуєш.
  tags: []
- id: 1769110839923
  fields:
    VideoFilename: pets_0164.webm
    Front: Well, I don&#x27;t care!
    Back: Ну, мені байдуже!
  tags: []
- id: 1769110839924
  fields:
    VideoFilename: pets_0165.webm
    Front: Who&#x27;s with me?
    Back: Хто зі мною?
  tags: []
- id: 1769110839925
  fields:
    VideoFilename: pets_0166.webm
    Front: Oh, come on, guys. I can't believe you
    Back: Та годі, хлопці. Не можу в це повірити.
  tags: []
- id: 1769110839926
  fields:
    VideoFilename: pets_0167.webm
    Front: When I got my claws caught in the curtains who pulled me down?
    Back: Коли мої кігті застрягли в шторах, хто мене зняв?
  tags: []
- id: 1769110839927
  fields:
    VideoFilename: pets_0168.webm
    Front: When you were fixed, who taught you to sit the comfortable way?
    Back: Коли тебе кастрували, хто навчив тебе зручно сидіти?
  tags: []
- id: 1769110839928
  fields:
    VideoFilename: pets_0169.webm
    Front: The identity of the random cat is not the point
    Back: Особистість випадкового кота — не головне.
  tags: []
- id: 1769110839929
  fields:
    VideoFilename: pets_0170.webm
    Front: I only know the doggy paddle! And I don&#x27;t know it well!
    Back: Я знаю лише «собачий стиль»! І то не дуже добре!
  tags: []
- id: 1769110839930
  fields:
    VideoFilename: pets_0171.webm
    Front: Max, grab the ring!
    Back: Максе, хапай кільце!
  tags: []
- id: 1769110839931
  fields:
    VideoFilename: pets_0172.webm
    Front: Isn&#x27;t home that way?
    Back: Хіба дім не в тому напрямку?
  tags: []
- id: 1769110839932
  fields:
    VideoFilename: pets_0173.webm
    Front: And it's got buck teeth and a cotton tail
    Back: І в нього передні зуби стирчать і пухнастий хвостик.
  tags: []
- id: 1769110839933
  fields:
    VideoFilename: pets_0174.webm
    Front: Pops knows everyone in this city
    Back: Попс знає всіх у цьому місті.
  tags: []
- id: 1769110839934
  fields:
    VideoFilename: pets_0175.webm
    Front: If he agrees to help us, Max is as good as found
    Back: Якщо він погодиться нам допомогти, Макса можна вважати знайденим.
  tags: []
- id: 1769110839935
  fields:
    VideoFilename: pets_0176.webm
    Front: Tell me you got that!
    Back: Скажи, що ти це зняв!
  tags: []
- id: 1769110839936
  fields:
    VideoFilename: pets_0177.webm
    Front: You see Pops around here?
    Back: Ти бачив тут Попса?
  tags: []
- id: 1769110839937
  fields:
    VideoFilename: pets_0178.webm
    Front: Yeah, he's over there
    Back: Так, він он там.
  tags: []
- id: 1769992700213
  fields:
    VideoFilename: pets_0179.webm
    Front: How you been, old-timer?
    Back: Як справи, старий?
  tags: []
- id: 1769992700214
  fields:
    VideoFilename: pets_0180.webm
    Front: Buddy said that maybe you could help us
    Back: Бадді сказав, що, можливо, ти зможеш нам допомогти.
  tags: []
- id: 1769992700215
  fields:
    VideoFilename: pets_0181.webm
    Front: By the way, I meant no offense, I just. Have you seen yourself?
    Back: До речі, я не хотів образити, просто… ти себе бачив?
  tags: []
- id: 1769992700216
  fields:
    VideoFilename: pets_0182.webm
    Front: Well, what me can see. It's all an attractive blur
    Back: Ну, те, що я бачу — це суцільна приваблива розмита картинка.
  tags: []
- id: 1769992700217
  fields:
    VideoFilename: pets_0183.webm
    Front: All right, party&#x27;s over!
    Back: Гаразд, вечірка закінчена!
  tags: []
- id: 1769992700218
  fields:
    VideoFilename: pets_0184.webm
    Front: So, where are you from, my fuzzy angel?
    Back: То звідки ти, мій пухнастий янголе?
  tags: []
- id: 1769992700219
  fields:
    VideoFilename: pets_0185.webm
    Front: Dude, I'm a cat
    Back: Чувак, я кіт.
  tags: []
- id: 1769992700220
  fields:
    VideoFilename: pets_0186.webm
    Front: Well, nobody's perfect
    Back: Ну, ніхто не ідеальний.
  tags: []
- id: 1769992700221
  fields:
    VideoFilename: pets_0187.webm
    Front: Oh, man. Would you look at that sandwich!
    Back: О, друже. Поглянь ти на цей сендвіч!
  tags: []
- id: 1769992700222
  fields:
    VideoFilename: pets_0188.webm
    Front: We are descended from the mighty wolf!
    Back: Ми походили від могутнього вовка!
  tags: []
- id: 1769992700223
  fields:
    VideoFilename: pets_0189.webm
    Front: We have raw, primal instincts
    Back: У нас є дикі, первісні інстинкти.
  tags: []
- id: 1769992700224
  fields:
    VideoFilename: pets_0190.webm
    Front: Maybe the legend of dogs coming from wolves is just wrong
    Back: Можливо, легенда про походження собак від вовків — просто неправда.
  tags: []
- id: 1769992700225
  fields:
    VideoFilename: pets_0191.webm
    Front: Well, then, what are we waiting for?
    Back: Ну тоді чого ми чекаємо?
  tags: []
- id: 1769992700226
  fields:
    VideoFilename: pets_0192.webm
    Front: We're coming for you, baby!
    Back: Ми йдемо за тобою, маля!
  tags: []
- id: 1769992700227
  fields:
    VideoFilename: pets_0193.webm
    Front: Lower the ramp, dummy
    Back: Опусти рампу, дурнику.
  tags: []
- id: 1769992700228
  fields:
    VideoFilename: pets_0194.webm
    Front: One hundred percent wrong
    Back: На сто відсотків неправильно.
  tags: []
- id: 1769992700229
  fields:
    VideoFilename: pets_0195.webm
    Front: Good enough
    Back: Досить добре.
  tags: []
- id: 1769992700230
  fields:
    VideoFilename: pets_0196.webm
    Front: Come on! Let&#x27;s go! Move it or lose it!
    Back: Давай! Ходімо! Рухайся або програєш!
  tags: []
- id: 1769992700231
  fields:
    VideoFilename: pets_0197.webm
    Front: You may have lots of time, but for me every breath is a cliffhanger.
    Back: У тебе може бути багато часу, а для мене кожен подих — як на краю прірви.
  tags: []
- id: 1769992700232
  fields:
    VideoFilename: pets_0198.webm
    Front: Okay. The secret route was death
    Back: Добре. Таємний маршрут — це була смерть.
  tags: []
- id: 1769992700233
  fields:
    VideoFilename: pets_0199.webm
    Front: Well, that's that, I guess
    Back: Ну, от і все, мабуть.
  tags: []
- id: 1769992700234
  fields:
    VideoFilename: pets_0200.webm
    Front: Get down here!
    Back: Спускайся сюди!
  tags: []
- id: 1769992700235
  fields:
    VideoFilename: pets_0201.webm
    Front: Stop it! Look away!
    Back: Припини! Відвернися!
  tags: []
- id: 1769992700236
  fields:
    VideoFilename: pets_0202.webm
    Front: Come on, slowpokes!
    Back: Давайте, соні!
  tags: []
- id: 1769992700237
  fields:
    VideoFilename: pets_0203.webm
    Front: All right, now, these guys are a bit testy
    Back: Гаразд, ці хлопці трохи запальні.
  tags: []
- id: 1769992700238
  fields:
    VideoFilename: pets_0204.webm
    Front: So, just let me do the talking
    Back: Тож просто дозволь мені говорити.
  tags: []
- id: 1769992700239
  fields:
    VideoFilename: pets_0205.webm
    Front: You will not be forgotten!
    Back: Тебе не забудуть!
  tags: []
- id: 1769992700240
  fields:
    VideoFilename: pets_0206.webm
    Front: You will be avenged, Viper!
    Back: Тебе буде помщено, Вайпере!
  tags: []
- id: 1769992700241
  fields:
    VideoFilename: pets_0207.webm
    Front: You can look at my battle plans. It's all laid out right here
    Back: Можеш подивитися мої бойові плани. Це все є викладеним ось тут
  tags: []
- id: 1769992700242
  fields:
    VideoFilename: pets_0208.webm
    Front: Well, you gotta really look at it to understand it.
    Back: Ну, вам треба добре на це подивитися, щоб зрозуміти.
  tags: []
- id: 1769992700243
  fields:
    VideoFilename: pets_0209.webm
    Front: That ball of fluff's got a screw loose
    Back: У того клубка пуху явно не всі вдома.
  tags: []
- id: 1769992700244
  fields:
    VideoFilename: pets_0210.webm
    Front: That's kind of hard to dispute
    Back: З цим важко посперечатися.
  tags: []
- id: 1769992700245
  fields:
    VideoFilename: pets_0211.webm
    Front: Uh, nobody says that
    Back: Е-е, ніхто так не каже
  tags: []
- id: 1769992700246
  fields:
    VideoFilename: pets_0212.webm
    Front: Did they all get away?
    Back: Вони всі втекли?
  tags: []
- id: 1769992700247
  fields:
    VideoFilename: pets_0213.webm
    Front: Just ignore what just happened
    Back: Просто ігноруй те, що щойно сталося.
  tags: []
- id: 1769992700248
  fields:
    VideoFilename: pets_0214.webm
    Front: Right back at you, man
    Back: Тобі того ж, друже.
  tags: []
- id: 1769992700249
  fields:
    VideoFilename: pets_0215.webm
    Front: What are you talking about?
    Back: Про що ти говориш?
  tags: []
- id: 1769992700250
  fields:
    VideoFilename: pets_0216.webm
    Front: My old owner and I used to live around here
    Back: Мій колишній господар і я колись жили тут неподалік.
  tags: []
- id: 1769992700251
  fields:
    VideoFilename: pets_0217.webm
    Front: It was a long time ago
    Back: Це було дуже давно.
  tags: []
- id: 1769992700252
  fields:
    VideoFilename: pets_0218.webm
    Front: I don't want to talk about it
    Back: Я не хочу про це говорити.
  tags: []
- id: 1769992700253
  fields:
    VideoFilename: pets_0219.webm
    Front: We'd play fetch
    Back: Ми гралися в апорт.
  tags: []
- id: 1769992700254
  fields:
    VideoFilename: pets_0220.webm
    Front: We'd go for walks
    Back: Ми ходили на прогулянки.
  tags: []
- id: 1769992700255
  fields:
    VideoFilename: pets_0221.webm
    Front: I got out one night, chasing a butterfly, or a car.
    Back: Якось уночі я вибіг, ганяючись за метеликом… або машиною.
  tags: []
- id: 1769992700256
  fields:
    VideoFilename: pets_0222.webm
    Front: By the time I had caught up with it and ate it…
    Back: Поки я його наздогнав і з&#x27;їв…
  tags: []
- id: 1769992700257
  fields:
    VideoFilename: pets_0223.webm
    Front: I realized I was so far away from my home
    Back: Я зрозумів, що опинився дуже далеко від дому.
  tags: []
- id: 1769992700258
  fields:
    VideoFilename: pets_0224.webm
    Front: A few days later, I was picked up by Animal Control.
    Back: Через кілька днів мене забрала служба відлову тварин.
  tags: []
- id: 1769992700259
  fields:
    VideoFilename: pets_0225.webm
    Front: I mean, he&#x27;s probably worried sick!
    Back: Ну, він, мабуть, страшенно хвилюється!
  tags: []
- id: 1769992700260
  fields:
    VideoFilename: pets_0226.webm
    Front: There ain&#x27;t no curing what&#x27;s wrong with that thing!
    Back: Те, що з тим створінням не так, не вилікуєш!
  tags: []
- id: 1769992700261
  fields:
    VideoFilename: pets_0227.webm
    Front: Maybe there's a dog in the neighborhood that looks like Max
    Back: Можливо, в окрузі є собака, схожий на Макса.
  tags: []
- id: 1769992700262
  fields:
    VideoFilename: pets_0228.webm
    Front: We're dedicated. We're loyal
    Back: Ми віддані. Ми вірні.
  tags: []
- id: 1769992700263
  fields:
    VideoFilename: pets_0229.webm
    Front: Well, congratulations! Today you&#x27;re dogs, whether you like it or not!
    Back: Ну що ж, вітаю! Сьогодні ви — собаки, подобається вам це чи ні!
  tags: []
- id: 1769992700264
  fields:
    VideoFilename: pets_0230.webm
    Front: A light bulb just went off in my brain.
    Back: У мене щойно сяйнула ідея.
  tags: []
- id: 1769992700265
  fields:
    VideoFilename: pets_0231.webm
    Front: Okay, so, uh, how do I look? You look great.
    Back: Гаразд, е-е, як я виглядаю? — Чудово.
  tags: []
- id: 1769992700266
  fields:
    VideoFilename: pets_0232.webm
    Front: How do I smell? Like a dog, Duke
    Back: Як я пахну? — Як собака, Дюку.
  tags: []
- id: 1769992700267
  fields:
    VideoFilename: pets_0233.webm
    Front: Go scratch at that door
    Back: Іди подряпай ті двері.
  tags: []
- id: 1769992700268
  fields:
    VideoFilename: pets_0234.webm
    Front: Let's have a long talk about why you think I'm stalling
    Back: Давай серйозно поговоримо, чому ти думаєш, що я тягну час.
  tags: []
- id: 1769992700269
  fields:
    VideoFilename: pets_0235.webm
    Front: And I&#x27;m gonna have to ask you to get off my lawn
    Back: І мені доведеться попросити тебе забратися з мого газону.
  tags: []
- id: 1769992700270
  fields:
    VideoFilename: pets_0236.webm
    Front: Maybe I made a mistake, saying we should come here. Let's go
    Back: Може, я помилився, сказавши, що нам варто сюди прийти. Ходімо.
  tags: []
- id: 1769992700271
  fields:
    VideoFilename: pets_0237.webm
    Front: You&#x27;re a liar!
    Back: Ти брехун!
  tags: []
- id: 1769992700272
  fields:
    VideoFilename: pets_0238.webm
    Front: This isn't your home anymore
    Back: Це більше не твій дім.
  tags: []
- id: 1769992700273
  fields:
    VideoFilename: pets_0239.webm
    Front: Why did you bring me here, Max?
    Back: Навіщо ти привів мене сюди, Максе?
  tags: []
- id: 1769992700274
  fields:
    VideoFilename: pets_0240.webm
    Front: Wait a minute. This is my fault?
    Back: Зачекай. Це моя вина?
  tags: []
- id: 1769992700275
  fields:
    VideoFilename: pets_0241.webm
    Front: You were trying to get rid of me!
    Back: Ти намагався від мене позбутися!
  tags: []
- id: 1769992700276
  fields:
    VideoFilename: pets_0242.webm
    Front: Finally got you, big fella
    Back: Нарешті я тебе дістав, здоровило.
  tags: []
- id: 1769992700277
  fields:
    VideoFilename: pets_0243.webm
    Front: Ah, are you kidding me?
    Back: Ти серйозно?
  tags: []
- id: 1769992700278
  fields:
    VideoFilename: pets_0244.webm
    Front: You thought this was over, Tiny Dog?
    Back: Ти думав, що це кінець, Крихітний Пес?
  tags: []
- id: 1769992700279
  fields:
    VideoFilename: pets_0245.webm
    Front: Would you get off me!
    Back: Та злізь же з мене!
  tags: []
- id: 1769992700280
  fields:
    VideoFilename: pets_0246.webm
    Front: This kills me to say, but we gotta join forces, man.
    Back: Мені важко це сказати, але нам доведеться об&#x27;єднатися, друже.
  tags: []
- id: 1769992700281
  fields:
    VideoFilename: pets_0247.webm
    Front: Well, mainly, I'm doing all the hard work, but you're helping!
    Back: Ну, загалом усю важку роботу роблю я, але ти допомагаєш!
  tags: []
- id: 1769992700282
  fields:
    VideoFilename: pets_0248.webm
    Front: Fine. Just keep your eyes on the road. You're driving like an animal!
    Back: Добре. Тільки дивися на дорогу. Ти водиш як тварина!
  tags: []
- id: 1769992700283
  fields:
    VideoFilename: pets_0249.webm
    Front: What was that?
    Back: Що це було?
  tags: []
- id: 1769992700284
  fields:
    VideoFilename: pets_0250.webm
    Front: That was a pothole. You're hitting things on purpose!
    Back: Це була вибоїна. Ти спеціально врізаєшся в усе підряд!
  tags: []
- id: 1769992700285
  fields:
    VideoFilename: pets_0251.webm
    Front: Heh. You know me too well, TD!
    Back: Хе. Ти мене надто добре знаєш, Ті-Ді!
  tags: []
- id: 1769992700286
  fields:
    VideoFilename: pets_0252.webm
    Front: Always keeping me in check
    Back: Завжди тримаєш мене під контролем.
  tags: []
- id: 1769992700287
  fields:
    VideoFilename: pets_0253.webm
    Front: Do you see the van?
    Back: Ти бачиш фургон?
  tags: []
- id: 1769992700288
  fields:
    VideoFilename: pets_0254.webm
    Front: We're about to hit it.
    Back: Ми зараз у нього вріжемося.
  tags: []
- id: 1769992700289
  fields:
    VideoFilename: pets_0255.webm
    Front: Relax, Snowball, I got you
    Back: Розслабся, Сніжку, я з тобою.
  tags: []
- id: 1769992700290
  fields:
    VideoFilename: pets_0256.webm
    Front: There he is!
    Back: Ось він!
  tags: []
- id: 1769992700291
  fields:
    VideoFilename: pets_0257.webm
    Front: Look, fellas, this is not what this looks like.
    Back: Слухайте, хлопці, це не те, чим здається.
  tags: []
- id: 1769992700292
  fields:
    VideoFilename: pets_0258.webm
    Front: Snowball and I are on the same side now
    Back: Ми зі Сніжком тепер на одному боці.
  tags: []
- id: 1769992700293
  fields:
    VideoFilename: pets_0259.webm
    Front: I&#x27;m a little wet, but I still look good.
    Back: Я трохи мокрий, але все одно виглядаю добре.
  tags: []
- id: 1769992700294
  fields:
    VideoFilename: pets_0260.webm
    Front: Until they're beating up dozens of animals on the Brooklyn Bridge?
    Back: Поки вони не луплять десятки тварин на Бруклінському мосту?
  tags: []
- id: 1769992700295
  fields:
    VideoFilename: pets_0261.webm
    Front: Now, it's back to our primary mission
    Back: А тепер — повертаємось до нашої головної місії.
  tags: []
- id: 1769992700296
  fields:
    VideoFilename: pets_0262.webm
    Front: Mommy! Can I have a bunny?
    Back: Мамо! Можна мені зайчика?
  tags: []
- id: 1769992700297
  fields:
    VideoFilename: pets_0263.webm
    Front: And a pig and a crocodile and a lizard?
    Back: І ще свинку, і крокодила, і ящірку?
  tags: []
- id: 1769992700298
  fields:
    VideoFilename: pets_0264.webm
    Front: What&#x27;s going on? What&#x27;s she doing?
    Back: Що відбувається? Що вона робить?
  tags: []
- id: 1769992700299
  fields:
    VideoFilename: pets_0265.webm
    Front: Bunny, I'm gonna love you forever and ever and ever
    Back: Зайчику, я любитиму тебе вічно-віковічно.
  tags: []
- id: 1769992700300
  fields:
    VideoFilename: pets_0266.webm
    Front: There they are!
    Back: Ось вони!
  tags: []
- id: 1769992700301
  fields:
    VideoFilename: pets_0267.webm
    Front: So, how&#x27;d it go? Great, right?
    Back: Ну як усе пройшло? Класно, так?
  tags: []
- id: 1769992700302
  fields:
    VideoFilename: pets_0268.webm
    Front: So, maybe a few bumps
    Back: Ну, може, кілька штурханів.
  tags: []
- id: 1769992700303
  fields:
    VideoFilename: pets_0269.webm
    Front: But I knew this is gonna work out
    Back: Але я знала, що все вийде.
  tags: []
- id: 1769992700304
  fields:
    VideoFilename: pets_0270.webm
    Front: Who's hungry?
    Back: Ну що, хто голодний?
  tags: []
- id: 1769992700305
  fields:
    VideoFilename: pets_0271.webm
    Front: Oh, you guys look weird
    Back: Ой, ви, хлопці, дивно виглядаєте.
  tags: []
- id: 1769992700306
  fields:
    VideoFilename: pets_0272.webm
    Front: Hurry up, come on in
    Back: Швидше, заходьте.
  tags: []
- id: 1769992700307
  fields:
    VideoFilename: pets_0273.webm
    Front: Probably a butterfly, then
    Back: Тоді, мабуть, метелик.
  tags: []
- id: 1774217095814
  fields:
    VideoFilename: silicon_valley_0053.webm
    Front: Because if we can make your audio and video files smaller
    Back: Бо якщо ми зможемо зробити ваші аудіо- та відеофайли меншими…
  tags: []
- id: 1774217095817
  fields:
    VideoFilename: silicon_valley_0054.webm
    Front: What an asshole
    Back: Який же він мудак.
  tags: []
- id: 1774217095818
  fields:
    VideoFilename: silicon_valley_0055.webm
    Front: Why would he announce it so far ahead of the actual rollout?
    Back: Навіщо він оголошує це так задовго до реального запуску?
  tags: []
- id: 1774217095819
  fields:
    VideoFilename: silicon_valley_0056.webm
    Front: He&#x27;s got to be doing it just to fuck with us, right?
    Back: Він робить це просто щоб нас дістати, так?
  tags: []
- id: 1774217095820
  fields:
    VideoFilename: silicon_valley_0057.webm
    Front: That&#x27;s not really our logo, is it?
    Back: Це ж не наш логотип, правда?
  tags: []
- id: 1774217095821
  fields:
    VideoFilename: silicon_valley_0058.webm
    Front: Yeah, um, we may have a little problem there
    Back: Так, е-е, у нас тут невеличка проблема.
  tags: []
- id: 1774217095822
  fields:
    VideoFilename: silicon_valley_0059.webm
    Front: It's a classic fairy tale
    Back: Це класична казка.
  tags: []
- id: 1774217095823
  fields:
    VideoFilename: silicon_valley_0060.webm
    Front: Well, I looked it up.
    Back: Ну, я це перевірив.
  tags: []
- id: 1774217095824
  fields:
    VideoFilename: silicon_valley_0061.webm
    Front: Richard, if we are going to change the name, we need to do it now
    Back: Річарде, якщо ми збираємось змінити назву, треба робити це зараз.
  tags: []
- id: 1774217095825
  fields:
    VideoFilename: silicon_valley_0062.webm
    Front: I can't take these back. It was an online order
    Back: Я не можу це повернути. Це було онлайн-замовлення.
  tags: []
- id: 1774217095826
  fields:
    VideoFilename: silicon_valley_0063.webm
    Front: I thought we were gonna replace the name "Pied Piper". I thought it was a placeholder.
    Back: Я думав, ми замінимо назву «Pied Piper». Я думав, це тимчасова назва.
  tags: []
- id: 1774217095827
  fields:
    VideoFilename: silicon_valley_0064.webm
    Front: '"PlaceHolder" would honestly be a better name than "Pied Piper"'
    Back: «PlaceHolder», чесно кажучи, була б кращою назвою, ніж Pied Piper.
  tags: []
- id: 1774217095828
  fields:
    VideoFilename: silicon_valley_0065.webm
    Front: Because frankly, it's a little embarrassing.
    Back: бо, відверто кажучи, це трохи соромно.
  tags: []
- id: 1774217095829
  fields:
    VideoFilename: silicon_valley_0066.webm
    Front: Just to remind you, you are not the co-founder.
    Back: нагадаю тобі, ти не співзасновник.
  tags: []
- id: 1774217095830
  fields:
    VideoFilename: silicon_valley_0067.webm
    Front: Richard, a name defines a company
    Back: Річарде, назва визначає компанію.
  tags: []
- id: 1774217095831
  fields:
    VideoFilename: silicon_valley_0068.webm
    Front: No, no, no. I'll negotiate with them
    Back: Ні, ні, ні. Я сам з ними домовлюсь.
  tags: []
- id: 1774217095832
  fields:
    VideoFilename: silicon_valley_0069.webm
    Front: No offense, Richard, but you're not a strong negotiator
    Back: Без образ, Річарде, але ти слабкий переговорник.
  tags: []
- id: 1774217095833
  fields:
    VideoFilename: silicon_valley_0070.webm
    Front: I'm a great negotiator, Dinesh
    Back: Я чудовий переговорник, Дінеше.
  tags: []
- id: 1774217095834
  fields:
    VideoFilename: silicon_valley_0071.webm
    Front: You&#x27;re a terrible negotiator. I&#x27;m a decent negotiator.
    Back: Ти жахливий переговорник. Я — нормальний.
  tags: []
- id: 1774217095835
  fields:
    VideoFilename: silicon_valley_0072.webm
    Front: As we discussed, our North Carolina plant went sideways.
    Back: Як ми обговорювали, наш завод у Північній Кароліні провалився.
  tags: []
- id: 1774217095836
  fields:
    VideoFilename: silicon_valley_0073.webm
    Front: We need fifteen million now or we'll have to shut down
    Back: Тож нам потрібно 15 мільйонів зараз, інакше доведеться закритися.
  tags: []
- id: 1774217095837
  fields:
    VideoFilename: silicon_valley_0074.webm
    Front: Have any of you ever eaten at "Burger King"?
    Back: Хтось із вас їв у «Burger King»?
  tags: []
- id: 1774217095838
  fields:
    VideoFilename: silicon_valley_0075.webm
    Front: I was just driven past one
    Back: Я щойно проїжджав повз один.
  tags: []
- id: 1774217095839
  fields:
    VideoFilename: silicon_valley_0076.webm
    Front: I realize I am unfamiliar with their offerings.
    Back: Розумію, що не знайомий із їхнім меню.
  tags: []
- id: 1774217095840
  fields:
    VideoFilename: silicon_valley_0077.webm
    Front: I prefer to think of myself as a citizen of the world
    Back: Я волію вважати себе громадянином світу.
  tags: []
- id: 1774217095841
  fields:
    VideoFilename: silicon_valley_0078.webm
    Front: Do you mind just sending them the form though so that they know you're here legally?
    Back: Можеш просто надіслати їм форму, щоб вони знали, що ти тут легально?
  tags: []
- id: 1774217095842
  fields:
    VideoFilename: silicon_valley_0079.webm
    Front: To wit, maybe you could make out my checks to cash?
    Back: Тобто, може, ти виписуватимеш мої чеки на готівку?
  tags: []
- id: 1774217095843
  fields:
    VideoFilename: silicon_valley_0080.webm
    Front: I didn&#x27;t know I was working with an illegal.
    Back: Я не знав, що працюю з нелегалом.
  tags: []
- id: 1774217095844
  fields:
    VideoFilename: silicon_valley_0081.webm
    Front: You remind me of my son
    Back: Ти нагадуєш мені мого сина.
  tags: []
- id: 1774217095845
  fields:
    VideoFilename: silicon_valley_0082.webm
    Front: I&#x27;m thinking about getting in another line of work anyway.
    Back: Я і так думаю змінити сферу діяльності.
  tags: []
- id: 1774217095846
  fields:
    VideoFilename: silicon_valley_0083.webm
    Front: Nobody jerks off to magazines any more
    Back: Ніхто вже не дрочить на журнали.
  tags: []
- id: 1774217095847
  fields:
    VideoFilename: silicon_valley_0084.webm
    Front: You can have the name for a thousand dollars
    Back: Можеш забрати назву за тисячу доларів.
  tags: []
- id: 1774217095848
  fields:
    VideoFilename: silicon_valley_0085.webm
    Front: This is Richard Hendricks, CEO of Pied Piper
    Back: Це Річард Хендрікс, CEO Pied Piper.
  tags: []
- id: 1774217095849
  fields:
    VideoFilename: silicon_valley_0086.webm
    Front: You guys said I was a bad negotiator, but I closed it!
    Back: Ви казали, що я поганий переговорник, але я закрив угоду!
  tags: []
- id: 1774217095850
  fields:
    VideoFilename: silicon_valley_0087.webm
    Front: You don&#x27;t sound that impressed.
    Back: Ти не звучиш дуже вражено.
  tags: []
- id: 1774217095851
  fields:
    VideoFilename: silicon_valley_0088.webm
    Front: You'll need it, too, when this town kicks you in the balls.
    Back: Тобі це ще знадобиться, коли це місто дасть тобі під дих.
  tags: []
