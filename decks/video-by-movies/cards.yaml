    Front: What did you think?
    Back: І що ти подумав?
  tags: []
- id: 1756921473745
  fields:
    VideoFilename: sherlok_0027.webm
    Front: You said you could identify a software designer by his tie
    Back: Ти казав, що можеш визначити розробника програмного забезпечення за його краваткою
  tags: []
- id: 1756921473746
  fields:
    VideoFilename: sherlok_0028.webm
    Front: And an airline pilot by his left thumb?
    Back: а пілота авіалінії — за його великим пальцем на лівій руці?
  tags: []
- id: 1756921473748
  fields:
    VideoFilename: sherlok_0030.webm
    Front: I'm your landlady, dear, not your housekeeper
    Back: Я твоя хазяйка, любий, а не домогосподарка.
  tags: []
- id: 1756921473749
  fields:
    VideoFilename: sherlok_0031.webm
    Front: I'll make you that cuppa, you rest your leg
    Back: Я зроблю тобі ту чашку чаю, а ти відпочинь ногу.
  tags: []
- id: 1756921473750
  fields:
    VideoFilename: sherlok_0032.webm
    Front: It's just sometimes this bloody thing
    Back: Просто іноді ця клята штука
  tags: []
- id: 1756921473751
  fields:
    VideoFilename: sherlok_0033.webm
    Front: Cup of tea'd be lovely. Thank you
    Back: Чашка чаю була б чудова. Дякую.
  tags: []
- id: 1756921473752
  fields:
    VideoFilename: sherlok_0034.webm
    Front: And it's going to take you a while to adjust to civilian life
    Back: і тобі знадобиться трохи часу, щоб звикнути до цивільного життя
  tags: []
- id: 1756921473753
  fields:
    VideoFilename: sherlok_0035.webm
    Front: Enough for a lifetime, far too much
    Back: <div>Достатньо на все життя, навіть занадто багато</div>
  tags: []
- id: 1756921473754
  fields:
    VideoFilename: sherlok_0036.webm
    Front: There's no point sitting at home when there's finally something fun going on!
    Back: Нема сенсу сидіти вдома, коли нарешті відбувається щось цікаве!
  tags: []
- id: 1756921473755
  fields:
    VideoFilename: sherlok_0037.webm
    Front: The only one in the world. I invented the job
    Back: Єдиний у світі. Я вигадав цю роботу.
  tags: []
- id: 1756921473756
  fields:
    VideoFilename: sherlok_0038.webm
    Front: How did you know?
    Back: Звідки ти знав?
  tags: []
- id: 1756921473757
  fields:
    VideoFilename: sherlok_0039.webm
    Front: Shot in the dark. Good one, though
    Back: Випадкове припущення. Але вдале.
  tags: []
- id: 1756921473758
  fields:
    VideoFilename: sherlok_0040.webm
    Front: Clara and Harry split up three months ago and they're getting a divorce
    Back: Клара і Гаррі розійшлися три місяці тому і тепер розлучаються.
  tags: []
- id: 1756921473759
  fields:
    VideoFilename: sherlok_0041.webm
    Front: Well, you know what I think, don't you?
    Back: Ну, ти ж знаєш, що я думаю, правда?
  tags: []
- id: 1756921473760
  fields:
    VideoFilename: sherlok_0042.webm
    Front: I'm sure Sally came round for a nice little chat and just happened to stay over
    Back: Я впевнений, що Саллі зайшла на приємну бесіду і випадково залишилася переночувати.
  tags: []
- id: 1756921473761
  fields:
    VideoFilename: sherlok_0043.webm
    Front: And I assume she scrubbed your floors, going by the state of her knees
    Back: І я припускаю, що вона помила твої підлоги, судячи з її колін.
  tags: []
- id: 1756921473762
  fields:
    VideoFilename: sherlok_0044.webm
    Front: You were thinking. It&#x27;s annoying.
    Back: Ти думав. Це дратує.
  tags: []
- id: 1756921473763
  fields:
    VideoFilename: sherlok_0045.webm
    Front: And writing a blog about everything that happens to you will honestly help you
    Back: а написання блогу про все, що з тобою відбувається, справді допоможе.
  tags: []
- id: 1756921473764
  fields:
    VideoFilename: sherlok_0046.webm
    Front: Yes, thank you for your input
    Back: Так, дякую за твій внесок.
  tags: []
- id: 1756921473765
  fields:
    VideoFilename: sherlok_0047.webm
    Front: Intended to stay in London for one night
    Back: Мала намір залишитися в Лондоні лише на одну ніч
  tags: []
- id: 1756921473766
  fields:
    VideoFilename: sherlok_0048.webm
    Front: So far, so obvious
    Back: дотепер усе очевидно.
  tags: []
- id: 1756921473767
  fields:
    VideoFilename: sherlok_0049.webm
    Front: Oh, for God&#x27;s sake, if you&#x27;re just making this up…
    Back: О, заради Бога, якщо ти це просто вигадуєш…
  tags: []
- id: 1756921473768
  fields:
    VideoFilename: sherlok_0050.webm
    Front: Dear God, what is it like in your funny little brains? It must be so boring
    Back: Господи, що це за смішні мізки у тебе? Там має бути так нудно.
  tags: []
- id: 1756921473769
  fields:
    VideoFilename: sherlok_0051.webm
    Front: Do you know you do that out loud?
    Back: Ти знаєш, що робиш це вголос?
  tags: []
- id: 1756921473770
  fields:
    VideoFilename: sherlok_0052.webm
    Front: Say that again
    Back: Повтори ще раз.
  tags: []
- id: 1756921473771
  fields:
    VideoFilename: sherlok_0053.webm
    Front: Sorry, where am I?
    Back: Вибач, де я?
  tags: []
- id: 1756921473772
  fields:
    VideoFilename: sherlok_0054.webm
    Front: He likes it. He gets off on it
    Back: Йому це подобається. Це його збуджує.
  tags: []
- id: 1756921473773
  fields:
    VideoFilename: sherlok_0055.webm
    Front: There is a security camera on the building to your left
    Back: <div>На будівлі ліворуч від тебе є камера спостереження</div>
  tags: []
- id: 1756921473774
  fields:
    VideoFilename: sherlok_0056.webm
    Front: Nothing happens to me
    Back: Зі мною нічого не відбувається.
  tags: []
- id: 1756921473775
  fields:
    VideoFilename: sherlok_0057.webm
    Front: I would make some sort of threat
    Back: <div>Я зробив би якийсь різновид погрози</div>
  tags: []
- id: 1756921473776
  fields:
    VideoFilename: sherlok_0058.webm
    Front: When one is avoiding the attention of Sherlock Holmes
    Back: Коли хтось уникає уваги Шерлока Холмса,
  tags: []
- id: 1756921473777
  fields:
    VideoFilename: sherlok_0059.webm
    Front: One learns to be discreet, hence this place
    Back: Інший вчиться бути стриманим(обережним), звідси й це місце.
  tags: []
- id: 1756921473778
  fields:
    VideoFilename: sherlok_0060.webm
    Front: Your leg must be hurting you
    Back: Мабуть, твоя нога болить.
  tags: []
- id: 1756921473779
  fields:
    VideoFilename: sherlok_0061.webm
    Front: You don't seem very afraid
    Back: Ти не виглядаєш дуже наляканим.
  tags: []
- id: 1756921473780
  fields:
    VideoFilename: sherlok_0062.webm
    Front: You don't seem very frightening
    Back: Ти не виглядаєш дуже страшним.
  tags: []
- id: 1756921473781
  fields:
    VideoFilename: sherlok_0063.webm
    Front: I don't have one. I barely know him. I met him
    Back: (What is your connection to SH?)У мене немає. Я його майже не знаю. Я зустрів його…
  tags: []
- id: 1756921473782
  fields:
    VideoFilename: sherlok_0064.webm
    Front: Might we expect a happy announcement by the end of the week?
    Back: Чи можемо ми чекати на радісну новину до кінця тижня?
  tags: []
- id: 1756921473783
  fields:
    VideoFilename: sherlok_0065.webm
    Front: How many friends do you imagine he has?
    Back: Скільки друзів, як ти думаєш, у нього є?
  tags: []
- id: 1756921473784
  fields:
    VideoFilename: sherlok_0066.webm
    Front: What do you mean, there&#x27;s no ruddy car?
    Back: Що ти маєш на увазі — немає чортової машини?
  tags: []
- id: 1756921473785
  fields:
    VideoFilename: sherlok_0067.webm
    Front: In the light of this, these incidents are now being treated as linked
    Back: <div>У світлі цього (з урахуванням цього), ці інциденти тепер розглядаються як пов’язані між
      собою.</div>
  tags: []
- id: 1756921473786
  fields:
    VideoFilename: sherlok_0068.webm
    Front: The investigation is ongoing
    Back: Розслідування триває
  tags: []
- id: 1757578920584
  fields:
    VideoFilename: sherlok_0069.webm
    Front: In his mind, certainly
    Back: У його уяві, безумовно.
  tags: []
- id: 1757578920585
  fields:
    VideoFilename: sherlok_0070.webm
    Front: He does love to be dramatic
    Back: Він справді любить драматизувати.
  tags: []
- id: 1757578920586
  fields:
    VideoFilename: sherlok_0071.webm
    Front: I hope I'm not distracting you
    Back: Сподіваюся, я не відволікаю тебе.
  tags: []
- id: 1757578920587
  fields:
    VideoFilename: sherlok_0072.webm
    Front: Not distracting me at all
    Back: Зовсім не відволікаєш.
  tags: []
- id: 1757578920588
  fields:
    VideoFilename: sherlok_0073.webm
    Front: Because you're not a wealthy man
    Back: Тому що ти не заможна людина.
  tags: []
- id: 1757578920589
  fields:
    VideoFilename: sherlok_0074.webm
    Front: In exchange for what?
    Back: В обмін на що?
  tags: []
- id: 1757578920590
  fields:
    VideoFilename: sherlok_0075.webm
    Front: But I haven't mentioned a figure
    Back: Але я не назвав жодної суми.
  tags: []
- id: 1757578920591
  fields:
    VideoFilename: sherlok_0076.webm
    Front: You've seen it already, haven't you?
    Back: Ти вже бачив це, чи не так?
  tags: []
- id: 1757578920592
  fields:
    VideoFilename: sherlok_0077.webm
    Front: You've told him already, haven't you?
    Back: Ти вже сказав йому, чи не так?
  tags: []
- id: 1757578920593
  fields:
    VideoFilename: sherlok_0078.webm
    Front: You asked me to come, I'm assuming it's important
    Back: Ти попросив мене прийти, я припускаю, що це важливо.
  tags: []
- id: 1757578920594
  fields:
    VideoFilename: sherlok_0079.webm
    Front: Murderer took her suitcase, first big mistake
    Back: Вбивця забрав її валізу — перша велика помилка.
  tags: []
- id: 1757578920595
  fields:
    VideoFilename: sherlok_0080.webm
    Front: Pity, we could have split the fee. Think it through next time
    Back: Шкода, ми могли б поділити гонорар. Продумай це як слід наступного разу.
  tags: []
- id: 1757578920596
  fields:
    VideoFilename: sherlok_0081.webm
    Front: Oh, perhaps I should mention I didn't kill her
    Back: О, можливо, слід згадати, що я її не вбивав.
  tags: []
- id: 1757578920597
  fields:
    VideoFilename: sherlok_0082.webm
    Front: Do people usually assume you&#x27;re the murderer?
    Back: Люди зазвичай припускають, що це ти вбивця?
  tags: []
- id: 1757578920598
  fields:
    VideoFilename: sherlok_0083.webm
    Front: Do you see what&#x27;s missing?
    Back: Бачиш, чого бракує?
  tags: []
- id: 1757578920599
  fields:
    VideoFilename: sherlok_0084.webm
    Front: Well, the question is where is her phone now?
    Back: Ну, питання в тому, де зараз її телефон?
  tags: []
- id: 1757578920600
  fields:
    VideoFilename: sherlok_0085.webm
    Front: Either way, the balance of probability is the murderer has her phone
    Back: У будь-якому разі, найбільш імовірно, що її телефон у вбивці.
  tags: []
- id: 1757578920601
  fields:
    VideoFilename: sherlok_0086.webm
    Front: You want me to come with you?
    Back: Хочеш, щоб я пішов з тобою?
  tags: []
- id: 1757578920602
  fields:
    VideoFilename: sherlok_0087.webm
    Front: No, I think he's brilliant enough
    Back: Ні, я думаю, він і так досить блискучий.
  tags: []
- id: 1757578920603
  fields:
    VideoFilename: sherlok_0088.webm
    Front: Who passes unnoticed wherever they go?
    Back: Хто проходить непоміченим, куди б він не пішов?
  tags: []
- id: 1757578920604
  fields:
    VideoFilename: sherlok_0089.webm
    Front: Who hunts in the middle of a crowd?
    Back: Хто полює серед натовпу?
  tags: []
- id: 1757578920605
  fields:
    VideoFilename: sherlok_0090.webm
    Front: Haven&#x27;t the faintest. Hungry?
    Back: Жодного уявлення. Голодний?
  tags: []
- id: 1757698811850
  fields:
    VideoFilename: sherlok_0091.webm
    Front: Keep your eyes on it
    Back: Не зводь з нього очей.
  tags: []
- id: 1757698811851
  fields:
    VideoFilename: sherlok_0092.webm
    Front: So who did I meet?
    Back: То з ким же я зустрівся?
  tags: []
- id: 1757698811852
  fields:
    VideoFilename: sherlok_0093.webm
    Front: You don&#x27;t have a girlfriend, then?
    Back: Отже, у тебе немає дівчини?
  tags: []
- id: 1757698811853
  fields:
    VideoFilename: sherlok_0094.webm
    Front: Do you have a boyfriend?
    Back: А хлопець у тебе є?
  tags: []
- id: 1757698811854
  fields:
    VideoFilename: sherlok_0095.webm
    Front: You're unattached. It's like me.
    Back: Ти ні з ким не зустрічаєшся. Як і я.
  tags: []
- id: 1757698811855
  fields:
    VideoFilename: sherlok_0096.webm
    Front: Nobody getting in and nobody getting out
    Back: Ніхто не входить і ніхто не виходить.
  tags: []
- id: 1757698811856
  fields:
    VideoFilename: sherlok_0097.webm
    Front: Don't stare. You're staring
    Back: Не витріщайся. Ти витріщаєшся.
  tags: []
- id: 1757698811857
  fields:
    VideoFilename: sherlok_0098.webm
    Front: How could you possibly know that?
    Back: Звідки ти взагалі міг це знати?
  tags: []
- id: 1757698811858
  fields:
    VideoFilename: sherlok_0099.webm
    Front: Yeah. I pickpocket him when he's annoying
    Back: <div>Так. Я краду в нього з кишень, коли він мене бісить</div>
  tags: []
- id: 1757698811859
  fields:
    VideoFilename: sherlok_0100.webm
    Front: That was ridiculous
    Back: Це було безглуздо.
  tags: []
- id: 1757698811860
  fields:
    VideoFilename: sherlok_0101.webm
    Front: Oh, just passing the time
    Back: О, просто коротаємо час.
  tags: []
- id: 1757698811861
  fields:
    VideoFilename: sherlok_0102.webm
    Front: Well, I knew you'd find the case, I'm not stupid
    Back: Ну, я знав, що ти знайдеш чемодан, я ж не дурень.
  tags: []
- id: 1757698811862
  fields:
    VideoFilename: sherlok_0103.webm
    Front: It's a drugs bust
    Back: Це облавa на наркотики.
  tags: []
- id: 1757698811863
  fields:
    VideoFilename: sherlok_0104.webm
    Front: Seriously? This guy - a junkie? Have you met him?
    Back: Серйозно? Цей тип — наркоман? Ти знайомий з ним?
  tags: []
- id: 1757698811864
  fields:
    VideoFilename: sherlok_0105.webm
    Front: I'm not your sniffer dog
    Back: Я ж не твій нюхач.
  tags: []
- id: 1757698811865
  fields:
    VideoFilename: sherlok_0106.webm
    Front: They're not strictly speaking on the drug squad, but they're very keen
    Back: Вони формально не з відділу з наркотиків, але дуже стараються.
  tags: []
- id: 1757698811866
  fields:
    VideoFilename: sherlok_0107.webm
    Front: So you set up a pretend drugs bust to bully me?
    Back: Тобто ти влаштував фальшиву облаву, щоб знущатися з мене?
  tags: []
- id: 1757698811867
  fields:
    VideoFilename: sherlok_0108.webm
    Front: It stops being pretend if we find anything
    Back: Це вже не буде вдаваним, якщо ми щось знайдемо.
  tags: []
- id: 1757698811868
  fields:
    VideoFilename: sherlok_0109.webm
    Front: I don't even smoke. Neither do I
    Back: Я навіть не курю. І я теж.
  tags: []
- id: 1757698811869
  fields:
    VideoFilename: sherlok_0110.webm
    Front: Never mind that, we found the case
    Back: Не переймайся цим, ми знайшли кейс.
  tags: []
- id: 1757698811870
  fields:
    VideoFilename: sherlok_0111.webm
    Front: According to someone, the murderer has the case
    Back: За словами когось, у вбивці є кейс.
  tags: []
- id: 1757698811871
  fields:
    VideoFilename: sherlok_0112.webm
    Front: It took effort, it would have hurt
    Back: Це потребувало зусиль, це мало б завдати болю.
  tags: []
- id: 1757698811872
  fields:
    VideoFilename: sherlok_0113.webm
    Front: You said that the victims all took the poison themselves
    Back: Ти сказав, що всі жертви прийняли отруту самостійно.
  tags: []
- id: 1757698811873
  fields:
    VideoFilename: sherlok_0114.webm
    Front: Isn't the doorbell working? Your taxi's here, Sherlock
    Back: Дзвінок не працює? Твоє таксі приїхало, Шерлоку.
  tags: []
- id: 1757698811874
  fields:
    VideoFilename: sherlok_0115.webm
    Front: Oh, dear. They're making such a mess
    Back: О, Боже. Вони таке безладдя влаштували.
  tags: []
- id: 1757698811875
  fields:
    VideoFilename: sherlok_0116.webm
    Front: She left the phone in order to lead us to her killer
    Back: Вона залишила телефон, для того щоб привести нас до свого вбивці.
  tags: []
- id: 1757698811876
  fields:
    VideoFilename: sherlok_0117.webm
    Front: Doesn't mean you don't need one
    Back: Це не означає, що тобі воно(таксі) потрібене
  tags: []
- id: 1757698811877
  fields:
    VideoFilename: sherlok_0118.webm
    Front: It's like you're invisible
    Back: Це ніби ти невидимий.
  tags: []
- id: 1757698811878
  fields:
    VideoFilename: sherlok_0119.webm
    Front: Proper advantage for a serial killer
    Back: Справжня перевага для серійного вбивці.
  tags: []
- id: 1757698811879
  fields:
    VideoFilename: sherlok_0120.webm
    Front: Is this a confession?
    Back: Це зізнання?
  tags: []
- id: 1757698811880
  fields:
    VideoFilename: sherlok_0121.webm
    Front: No one else will die, though, and I believe they call that a result
    Back: Але більше ніхто не помре, і, здається, це називають результатом.
  tags: []
- id: 1757698811881
  fields:
    VideoFilename: sherlok_0122.webm
    Front: What kind of result do you care about?
    Back: Який результат тебе цікавить?
  tags: []
- id: 1757698811882
  fields:
    VideoFilename: sherlok_0123.webm
    Front: What would I do?
    Back: А що б я зробив?
  tags: []
- id: 1757698811883
  fields:
    VideoFilename: sherlok_0124.webm
    Front: He just drove off in a cab
    Back: Він щойно поїхав на таксі.
  tags: []
- id: 1757698811884
  fields:
    VideoFilename: sherlok_0125.webm
    Front: He bloody left again
    Back: Він, чорт забирай, знову пішов.
  tags: []
- id: 1757698811885
  fields:
    VideoFilename: sherlok_0126.webm
    Front: We&#x27;re wasting our time!
    Back: Ми марнуємо час!
  tags: []
- id: 1757698811886
  fields:
    VideoFilename: sherlok_0127.webm
    Front: I was warned about you
    Back: Мене попереджали про тебе.
  tags: []
- id: 1757698811887
  fields:
    VideoFilename: sherlok_0128.webm
    Front: You're too modest, Mr Holmes. I'm really not
    Back: Ви занадто скромний, містере Холмс. Насправді ні.
  tags: []
- id: 1757698811888
  fields:
    VideoFilename: sherlok_0129.webm
    Front: So why do you put up with him?
    Back: То чому ти його терпиш?
  tags: []
- id: 1757698811889
  fields:
    VideoFilename: sherlok_0130.webm
    Front: Because I'm desperate, that's why
    Back: Тому що я у відчаї, ось чому.
  tags: []
- id: 1757698811890
  fields:
    VideoFilename: sherlok_0131.webm
    Front: You know every street in London. You know exactly where we are
    Back: Ти знаєш кожну вулицю Лондона. Ти точно знаєш, де ми.
  tags: []
- id: 1757698811891
  fields:
    VideoFilename: sherlok_0132.webm
    Front: I'm surprised more of us don't branch out
    Back: Я здивований, що більше з нас не розширюють діяльність.
  tags: []
- id: 1758042174793
  fields:
    VideoFilename: sherlok_0133.webm
    Front: Don't need this with you. 'cause you'll follow me
    Back: Не потребую цього з тобою. Бо ти підеш за мною.
  tags: []
- id: 1758042174798
  fields:
    VideoFilename: sherlok_0134.webm
    Front: I just have to do this
    Back: Мені просто треба це зробити.
  tags: []
- id: 1758042174799
  fields:
    VideoFilename: sherlok_0135.webm
    Front: Weren&#x27;t expecting that, were ya?
    Back: Не очікував цього, правда ж?
  tags: []
- id: 1758042174800
  fields:
    VideoFilename: sherlok_0136.webm
    Front: You are a proper genius
    Back: Ти справжній геній.
  tags: []
- id: 1758042174801
  fields:
    VideoFilename: sherlok_0137.webm
    Front: Between you and me sitting here, why can&#x27;t people think?
    Back: Між нами, сидячи тут — чому люди не можуть думати?
  tags: []
- id: 1758042174802
  fields:
    VideoFilename: sherlok_0138.webm
    Front: Don't it make you mad?
    Back: Хіба це не дратує тебе?
  tags: []
- id: 1758042174803
  fields:
    VideoFilename: sherlok_0139.webm
    Front: Funny little man driving a cab
    Back: Смішний маленький чоловік, що керує таксі.
  tags: []
- id: 1758042174804
  fields:
    VideoFilename: sherlok_0140.webm
    Front: There's a good bottle and a bad bottle
    Back: Є хороша пляшка і погана пляшка.
  tags: []
- id: 1758042174805
  fields:
    VideoFilename: sherlok_0141.webm
    Front: Both bottles are of course identical
    Back: Обидві пляшки, звісно, ідентичні.
  tags: []
- id: 1758042174806
  fields:
    VideoFilename: sherlok_0142.webm
    Front: What&#x27;s in it for me?
    Back: Що мені з того?
  tags: []
- id: 1758042174807
  fields:
    VideoFilename: sherlok_0143.webm
    Front: I'll take whatever pill you don't
    Back: Я візьму ту таблетку, яку ти не візьмеш.
  tags: []
- id: 1758042174808
  fields:
    VideoFilename: sherlok_0144.webm
    Front: You can choose either one
    Back: Ти можеш обрати будь-яку.
  tags: []
- id: 1758042174809
  fields:
    VideoFilename: sherlok_0145.webm
    Front: I know how people think I think
    Back: Я знаю, як люди думають, що я думаю.
  tags: []
- id: 1758042174810
  fields:
    VideoFilename: sherlok_0146.webm
    Front: Everyone's so stupid, even you
    Back: Всі такі тупі, навіть ти.
  tags: []
- id: 1758042174811
  fields:
    VideoFilename: sherlok_0147.webm
    Front: Either way, you're wasted as a cabbie
    Back: У будь-якому разі, ти марнуєшся як таксист.
  tags: []
- id: 1758042174812
  fields:
    VideoFilename: sherlok_0148.webm
    Front: That you're a dead man walking. So are you.
    Back: Що ти - ходячий мерець. І ти теж.
  tags: []
- id: 1758042174813
  fields:
    VideoFilename: sherlok_0149.webm
    Front: When I die, they won't get much, my kids
    Back: Коли я помру, вони не отримають багати, мої діти
  tags: []
- id: 1758042174814
  fields:
    VideoFilename: sherlok_0150.webm
    Front: You're not the only one to enjoy a good murder
    Back: Ти не єдиний, кому подобається «гарне» вбивство.
  tags: []
- id: 1758042174815
  fields:
    VideoFilename: sherlok_0151.webm
    Front: There's a name that no one says
    Back: Є ім'я, якого ніхто не вимовляє.
  tags: []
- id: 1758042174816
  fields:
    VideoFilename: sherlok_0152.webm
    Front: Well, this has been very interesting
    Back: Ну, це було дуже цікаво.
  tags: []
- id: 1758042174817
  fields:
    VideoFilename: sherlok_0153.webm
    Front: Just before you go, did you figure it out?
    Back: Перед тим як підеш — ти це зрозумів?
  tags: []
- id: 1758042174818
  fields:
    VideoFilename: sherlok_0154.webm
    Front: Can you beat me?
    Back: Чи можеш ти мене перевершити?/перебити?
  tags: []
- id: 1758042174819
  fields:
    VideoFilename: sherlok_0155.webm
    Front: I bet you get bored, don't you?
    Back: Б'юся об заклад, тобі нудно, чи не так?
  tags: []
- id: 1758042174820
  fields:
    VideoFilename: sherlok_0156.webm
    Front: You're dying, but there's still time to hurt you
    Back: Ти вмираєш, але ще є час заподіяти тобі болю.
  tags: []
- id: 1758042174821
  fields:
    VideoFilename: sherlok_0157.webm
    Front: Cleared off before we got here
    Back: Зникли до того, як ми прийшли.
  tags: []
- id: 1758042174822
  fields:
    VideoFilename: sherlok_0158.webm
    Front: Actually, do you know what? Ignore me
    Back: Знаєш що? Ігноруй мене.
  tags: []
- id: 1758065538939
  fields:
    VideoFilename: sherlok_0159.webm
    Front: I'm in shock - look, I've got a blanket
    Back: Я в шoці — дивись, у мене є ковдра.
  tags: []
- id: 1758065538941
  fields:
    VideoFilename: sherlok_0160.webm
    Front: And I just caught you a serial killer, more or less
    Back: Я щойно спіймав тобі серійного вбивцю, більш-менш.
  tags: []
- id: 1758065538942
  fields:
    VideoFilename: sherlok_0161.webm
    Front: Dreadful business, isn't it? Dreadful
    Back: Жахлива справа, чи не так? Жахлива
  tags: []
- id: 1758065538943
  fields:
    VideoFilename: sherlok_0162.webm
    Front: But he wasn't a very nice man
    Back: Але він не був дуже приємною людиною.
  tags: []
- id: 1758065538944
  fields:
    VideoFilename: sherlok_0163.webm
    Front: Frankly, a bloody awful cabbie
    Back: Відверто кажучи, справжній жах як таксист.
  tags: []
- id: 1758065538945
  fields:
    VideoFilename: sherlok_0164.webm
    Front: Stop! We can&#x27;t giggle, it&#x27;s a crime scene.
    Back: Стоп! Ми не можемо хіхікати, це місце злочину.
  tags: []
- id: 1758065538946
  fields:
    VideoFilename: sherlok_0165.webm
    Front: You were going to take that damn pill, weren&#x27;t you?
    Back: Ти збирався прийняти ту кляту пігулку, чи не так?
  tags: []
- id: 1758065538947
  fields:
    VideoFilename: sherlok_0166.webm
    Front: Biding my time. Knew you'd turn up
    Back: Чекав свого часу. Знав, що ти з'явишся.
  tags: []
- id: 1758065538948
  fields:
    VideoFilename: sherlok_0167.webm
    Front: You risk your life to prove you're clever
    Back: Ти ризикуєш життям, щоб довести, що ти розумний.
  tags: []
- id: 1758065538949
  fields:
    VideoFilename: sherlok_0168.webm
    Front: That's never really your motivation, is it?
    Back: Це ніколи по-справжньому не була твоя мотивація, чи не так?
  tags: []
- id: 1758065538950
  fields:
    VideoFilename: sherlok_0169.webm
    Front: As ever, I&#x27;m concerned about you.
    Back: Як завжди, я стурбований за тебе.
  tags: []
- id: 1758065538951
  fields:
    VideoFilename: sherlok_0170.webm
    Front: Oddly enough…no.
    Back: Як не дивно… ні.
  tags: []
- id: 1758065538952
  fields:
    VideoFilename: sherlok_0171.webm
    Front: Putting on weight again?
    Back: Знову набираєш вагу?
  tags: []
- id: 1758065538953
  fields:
    VideoFilename: sherlok_0172.webm
    Front: For goodness' sake
    Back: Ради всього святого(Ну серйозно…)
  tags: []
- id: 1758065538954
  fields:
    VideoFilename: sherlok_0173.webm
    Front: I occupy a minor position in the British Government.
    Back: Я займаю незначну посаду в британському уряді.
  tags: []
- id: 1758065538955
  fields:
    VideoFilename: sherlok_0174.webm
    Front: So, when you say you're concerned about him, you actually are concerned?
    Back: Отже, коли ти кажеш, що переймаєшся за нього, ти насправді переймаєшся?
  tags: []
- id: 1758065538956
  fields:
    VideoFilename: sherlok_0175.webm
    Front: He&#x27;s always been so resentful.
    Back: Він завжди був таким злопам&#x27;ятним.
  tags: []
- id: 1758065538957
  fields:
    VideoFilename: sherlok_0176.webm
    Front: I can always predict the fortune cookies
    Back: Я завжди можу передбачити, що буде в печиві з передбаченнями.
  tags: []
- id: 1758065538958
  fields:
    VideoFilename: sherlok_0177.webm
    Front: Either way, we'd better upgrade their surveillance status
    Back: У будь-якому разі нам краще підвищити їхній рівень спостереження.
  tags: []
- id: 1758649254216
  fields:
    VideoFilename: sherlok_0178.webm
    Front: Some things aren't supposed to sit behind glass
    Back: Деякі речі не призначені для того, щоб стояти за склом
  tags: []
- id: 1758649254217
  fields:
    VideoFilename: sherlok_0179.webm
    Front: This one shines a little brighter
    Back: А ця сяє трохи яскравіше.
  tags: []
- id: 1758649254218
  fields:
    VideoFilename: sherlok_0180.webm
    Front: You wouldn't like me all that much
    Back: Я б тобі не дуже сподобалася
  tags: []
- id: 1758649254219
  fields:
    VideoFilename: sherlok_0181.webm
    Front: Can I maybe decide that for myself?
    Back: Можливо, я можу вирішити це самостійно?
  tags: []
- id: 1758649254220
  fields:
    VideoFilename: sherlok_0182.webm
    Front: Unexpected item in bagging area, please try again.
    Back: Неочікуваний предмет у зоні пакування, будь ласка, спробуйте ще раз.
  tags: []
- id: 1758649254221
  fields:
    VideoFilename: sherlok_0183.webm
    Front: Because I had a row in the shop with a chip and PIN machine
    Back: Бо я посварився в магазині з терміналом для карток.
  tags: []
- id: 1758649254222
  fields:
    VideoFilename: sherlok_0184.webm
    Front: Sort of. It sat there and I shouted abuse. Have you got cash?
    Back: Типу того. Він стояв там, а я кричав образи. У тебе є готівка?
  tags: []
- id: 1758649254223
  fields:
    VideoFilename: sherlok_0185.webm
    Front: Don't worry about me, I can manage
    Back: Не хвилюйся за мене, я впораюся.
  tags: []
- id: 1758649254225
  fields:
    VideoFilename: sherlok_0187.webm
    Front: So you're doing well. You've been abroad a lot
    Back: Отже, у тебе все добре. Ти багато був за кордоном.
  tags: []
- id: 1758649254226
  fields:
    VideoFilename: sherlok_0188.webm
    Front: It's not a trick
    Back: Це не трюк.
  tags: []
- id: 1758649254227
  fields:
    VideoFilename: sherlok_0189.webm
    Front: I was just chatting with your secretary outside
    Back: Я щойно розмовляв із твоєю секретаркою на вулиці.
  tags: []
- id: 1758649254228
  fields:
    VideoFilename: sherlok_0190.webm
    Front: There's a hole in our security
    Back: У нашій безпеці є діра.
  tags: []
- id: 1758649254229
  fields:
    VideoFilename: sherlok_0191.webm
    Front: How did you know? Did you see his watch?
    Back: Звідки ти знав? Ти бачив його годинник?
  tags: []
- id: 1758649254230
  fields:
    VideoFilename: sherlok_0192.webm
    Front: They'll lead us to the person who sent it?
    Back: Вони приведуть нас до того, хто це надіслав?
  tags: []
- id: 1758649254231
  fields:
    VideoFilename: sherlok_0193.webm
    Front: Sit here and wait for him to come back?
    Back: Сидіти тут і чекати, поки він повернеться?
  tags: []
- id: 1758649254232
  fields:
    VideoFilename: sherlok_0194.webm
    Front: I live in the flat just below you. I don't think we've met
    Back: Я живу в квартирі прямо під тобою. Думаю, ми ще не знайомі.
  tags: []
- id: 1758649254233
  fields:
    VideoFilename: sherlok_0195.webm
    Front: No, well, er, I've just moved in
    Back: Ні, ну, е-е, я щойно переїхала
  tags: []
- id: 1758649254234
  fields:
    VideoFilename: sherlok_0196.webm
    Front: Actually, I've just locked my keys in my flat
    Back: Власне, я щойно зачинив ключі у своїй квартирі.
  tags: []
- id: 1758649254235
  fields:
    VideoFilename: sherlok_0197.webm
    Front: Yeah. And can I use your balcony?
    Back: Так. А я можу скористатися твоїм балконом?
  tags: []
- id: 1758649254236
  fields:
    VideoFilename: sherlok_0198.webm
    Front: Do you think he&#x27;d lost a lot of money?
    Back: Ти думаєш, він втратив багато грошей?
  tags: []
- id: 1758649254237
  fields:
    VideoFilename: sherlok_0199.webm
    Front: The door was locked from the inside, you had to climb down the balcony.
    Back: Двері були замкнені зсередини, довелося спускатися через балкон.
  tags: []
- id: 1758649254238
  fields:
    VideoFilename: sherlok_0200.webm
    Front: Look at the case, there was something tightly packed inside it
    Back: Подивися на кейс, всередині було щось щільно запаковане.
  tags: []
- id: 1758649254239
  fields:
    VideoFilename: sherlok_0201.webm
    Front: Yeah, I'm not desperate to root around some bloke's dirty underwear
    Back: Та, я не горю бажанням ритися в брудній білизні якогось мужика.
  tags: []
- id: 1758649254240
  fields:
    VideoFilename: sherlok_0202.webm
    Front: Some sort of code? Obviously.
    Back: Якийсь код? Очевидно.
  tags: []
- id: 1758649254241
  fields:
    VideoFilename: sherlok_0203.webm
    Front: And I'd prefer it if you didn't tamper with any of the evidence
    Back: І я б волів, щоб ви не чіпали жодних доказів
  tags: []
- id: 1758649254242
  fields:
    VideoFilename: sherlok_0204.webm
    Front: Wrong, it's one possible explanation of some of the facts
    Back: Ні, це лише одне з можливих пояснень деяких фактів.
  tags: []
- id: 1758649254243
  fields:
    VideoFilename: sherlok_0205.webm
    Front: D'you want me to go on?
    Back: Хочеш, щоб я продовжив?
  tags: []
- id: 1758649254244
  fields:
    VideoFilename: sherlok_0206.webm
    Front: Conclusion, someone broke in here and murdered him
    Back: 'Висновок: хтось увірвався сюди і вбив його.'
  tags: []
- id: 1758649254245
  fields:
    VideoFilename: sherlok_0207.webm
    Front: He'd been threatened
    Back: Йому погрожували.
  tags: []
- id: 1758649254246
  fields:
    VideoFilename: sherlok_0208.webm
    Front: Today at the bank, sort of a warning
    Back: Сьогодні в банку, щось на кшталт попередження.
  tags: []
- id: 1758649254247
  fields:
    VideoFilename: sherlok_0209.webm
    Front: He fired a shot when his attacker came in.
    Back: Він вистрілив, коли його нападник увійшов.
  tags: []
- id: 1758658610003
  fields:
    VideoFilename: sherlok_0186.webm
    Front: If you'd be able to lend me some
    Back: якби ви могли позичити мені трохи
  tags: []
- id: 1758884938637
  fields:
    VideoFilename: sherlok_0210.webm
    Front: And the bullet? Went through the open window
    Back: А куля? Пройшла крізь відкрите вікно.
  tags: []
- id: 1758884938638
  fields:
    VideoFilename: sherlok_0211.webm
    Front: What are the chances of that?
    Back: Які шанси на таке?!
  tags: []
- id: 1758884938639
  fields:
    VideoFilename: sherlok_0212.webm
    Front: But if his door was locked from the inside, how did the killer get in?
    Back: Якщо його двері були замкнені зсередини, то як убивця потрапив усередину?
  tags: []
- id: 1758884938640
  fields:
    VideoFilename: sherlok_0213.webm
    Front: Good, you're finally asking the right questions
    Back: Добре, ти нарешті ставиш правильні запитання.
  tags: []
- id: 1758884938641
  fields:
    VideoFilename: sherlok_0214.webm
    Front: It was a threat, that's what the graffiti meant
    Back: Це була погроза, саме це означало графіті.
  tags: []
- id: 1758884938642
  fields:
    VideoFilename: sherlok_0215.webm
    Front: One of your traders, someone who works in your office, was killed.
    Back: Один із ваших трейдерів, хтось, хто працював у вашому офісі, був убитий.
  tags: []
- id: 1758884938643
  fields:
    VideoFilename: sherlok_0216.webm
    Front: You gave him the Hong Kong accounts?
    Back: Ти дав йому гонконзькі рахунки?
  tags: []
- id: 1758884938644
  fields:
    VideoFilename: sherlok_0217.webm
    Front: It&#x27;s my chairman. Police have been on to him.
    Back: Це мій голова ради. Поліція вийшла на нього.
  tags: []
- id: 1758884938645
  fields:
    VideoFilename: sherlok_0218.webm
    Front: I hired you to do a job. Don't get sidetracked
    Back: Я найняв тебе виконати роботу. Не відволікайся.
  tags: []
- id: 1758884938646
  fields:
    VideoFilename: sherlok_0219.webm
    Front: Soo Lin has resigned her job.
    Back: Су Лін звільнилася зі своєї роботи.
  tags: []
- id: 1758884938647
  fields:
    VideoFilename: sherlok_0220.webm
    Front: It might be a bit mundane for you
    Back: Це може здатися тобі трохи буденним.
  tags: []
- id: 1758884938648
  fields:
    VideoFilename: sherlok_0221.webm
    Front: It says here you were a soldier
    Back: Тут написано, що ти був солдатом.
  tags: []
- id: 1758884938649
  fields:
    VideoFilename: sherlok_0222.webm
    Front: Anything else you can do?
    Back: Ще щось умієш?
  tags: []
- id: 1758884938650
  fields:
    VideoFilename: sherlok_0223.webm
    Front: I said, could you pass me a pen?
    Back: Я ж сказав, чи можеш подати мені ручку?
  tags: []
- id: 1758884938651
  fields:
    VideoFilename: sherlok_0224.webm
    Front: Didn&#x27;t notice I&#x27;d gone out then?
    Back: Не помітив, що я тоді вийшов?
  tags: []
- id: 1758884938653
  fields:
    VideoFilename: sherlok_0226.webm
    Front: Doors locked from the inside
    Back: Двері замкнені зсередини.
  tags: []
- id: 1758884938654
  fields:
    VideoFilename: sherlok_0227.webm
    Front: You&#x27;ve got to admit, it&#x27;s similar
    Back: Ти маєш визнати, це схоже.
  tags: []
- id: 1758884938655
  fields:
    VideoFilename: sherlok_0228.webm
    Front: Both men killed by someone who can walk through solid walls.
    Back: Обох чоловіків убив хтось, хто може проходити крізь суцільні стіни.
  tags: []
- id: 1758884938656
  fields:
    VideoFilename: sherlok_0229.webm
    Front: So this investigation might move a bit quicker if you were to take my word as gospel.
    Back: Це розслідування могло б рухатися швидше, якби ти сприймав мої слова як істину.
  tags: []
- id: 1758884938657
  fields:
    VideoFilename: sherlok_0230.webm
    Front: I&#x27;ve just handed you a murder inquiry.
    Back: Я щойно передав тобі справу про вбивство.
  tags: []
- id: 1758884938658
  fields:
    VideoFilename: sherlok_0231.webm
    Front: That's why they think they're safe
    Back: Ось чому вони думають, що в безпеці.
  tags: []
- id: 1758884938659
  fields:
    VideoFilename: sherlok_0232.webm
    Front: Dealing with a killer who can climb
    Back: Маємо справу з убивцею, який уміє лазити.
  tags: []
- id: 1758884938660
  fields:
    VideoFilename: sherlok_0233.webm
    Front: Clings to the walls like an insect
    Back: Чіпляється за стіни, як комаха.
  tags: []
- id: 1758884938661
  fields:
    VideoFilename: sherlok_0234.webm
    Front: I have to find out what connects these two men
    Back: Я маю з'ясувати, що пов'язує цих двох чоловіків.
  tags: []
- id: 1758884938662
  fields:
    VideoFilename: sherlok_0235.webm
    Front: Only the cipher can tell us
    Back: Лише шифр може нам сказати.
  tags: []
- id: 1758884938663
  fields:
    VideoFilename: sherlok_0236.webm
    Front: The world&#x27;s run on codes and ciphers, John.
    Back: Світ працює на кодах і шифрах, Джоне.
  tags: []
- id: 1758884938664
  fields:
    VideoFilename: sherlok_0237.webm
    Front: I need to ask some advice
    Back: Мені потрібно попросити пораду.
  tags: []
- id: 1758884938665
  fields:
    VideoFilename: sherlok_0238.webm
    Front: Part of a new exhibition.
    Back: Частина нової виставки.
  tags: []
- id: 1758884938666
  fields:
    VideoFilename: sherlok_0239.webm
    Front: Catchy
    Back: Чіпляє
  tags: []
- id: 1758884938667
  fields:
    VideoFilename: sherlok_0240.webm
    Front: Can we do this while I&#x27;m working?
    Back: Можемо зробити це, поки я працюю?
  tags: []
- id: 1758884938668
  fields:
    VideoFilename: sherlok_0241.webm
    Front: Know the author?
    Back: Знаєш автора?
  tags: []
- id: 1758884938669
  fields:
    VideoFilename: sherlok_0242.webm
    Front: I recognise the paint
    Back: Я впізнаю цю фарбу.
  tags: []
- id: 1758884938670
  fields:
    VideoFilename: sherlok_0243.webm
    Front: And what about the symbols? Do you recognise them?
    Back: А що щодо символів? Ти їх упізнаєш?
  tags: []
- id: 1758884938671
  fields:
    VideoFilename: sherlok_0244.webm
    Front: I&#x27;m not even sure it&#x27;s a proper language.
    Back: Я навіть не впевнений, що це справжня мова.
  tags: []
- id: 1758884938672
  fields:
    VideoFilename: sherlok_0245.webm
    Front: Bit of an enthusiast, are we?
    Back: Трішки ентузіаст, так?
  tags: []
- id: 1758884938673
  fields:
    VideoFilename: sherlok_0246.webm
    Front: Perhaps she was getting a bit of unwanted attention?
    Back: Можливо, вона отримувала трохи небажаної уваги?
  tags: []
- id: 1758884938674
  fields:
    VideoFilename: sherlok_0247.webm
    Front: You&#x27;ve been a while.
    Back: Тебе не було довгувато.
  tags: []
- id: 1758884938675
  fields:
    VideoFilename: sherlok_0248.webm
    Front: I have all his receipts.
    Back: У мене є всі його квитанції.
  tags: []
- id: 1758884938676
  fields:
    VideoFilename: sherlok_0249.webm
    Front: This is what you wanted, isn&#x27;t it? The journalist&#x27;s diary?
    Back: Це ж те, що ти хотів, чи не так? Щоденник журналіста?
  tags: []
- id: 1758884938677
  fields:
    VideoFilename: sherlok_0250.webm
    Front: The only things Eddie appreciated had a big price tag
    Back: Єдине, що Едді цінував, — це велика ціна.
  tags: []
- id: 1758910309792
  fields:
    VideoFilename: sherlok_0225.webm
    Front: The intruder who can walk through walls
    Back: Зловмисник, який може проходити крізь стіни
  tags: []
- id: 1759148938328
  fields:
    VideoFilename: sherlok_0252.webm
    Front: So he got a Tube back to the office.
    Back: Отже, він поїхав на метро назад в офіс.
  tags: []
- id: 1759148938330
  fields:
    VideoFilename: sherlok_0253.webm
    Front: Because he was delivering something heavy
    Back: Тому що він вез щось важке.
  tags: []
- id: 1759148938331
  fields:
    VideoFilename: sherlok_0254.webm
    Front: How could you tell?
    Back: Звідки ти це зрозумів?
  tags: []
- id: 1759148938332
  fields:
    VideoFilename: sherlok_0255.webm
    Front: Two men travel back from China
    Back: Двоє чоловіків повертаються з Китаю
  tags: []
- id: 1759148938333
  fields:
    VideoFilename: sherlok_0256.webm
    Front: And you don&#x27;t mean duty free
    Back: Ти ж не маєш на увазі duty-free
  tags: []
- id: 1759148938334
  fields:
    VideoFilename: sherlok_0257.webm
    Front: But why did they die?
    Back: Але чому вони померли?
  tags: []
- id: 1759148938335
  fields:
    VideoFilename: sherlok_0258.webm
    Front: It's been here since Monday
    Back: Воно тут з понеділка.
  tags: []
- id: 1759148938336
  fields:
    VideoFilename: sherlok_0259.webm
    Front: No one's been in that flat for at least three days
    Back: Ніхто не заходив у ту квартиру принаймні три дні.
  tags: []
- id: 1759148938337
  fields:
    VideoFilename: sherlok_0260.webm
    Front: Do you leave your windows open when you go on holiday?
    Back: Ти лишаєш вікна відкритими, коли їдеш у відпустку?
  tags: []
- id: 1759148938338
  fields:
    VideoFilename: sherlok_0261.webm
    Front: Someone else has been here
    Back: Хтось інший тут був.
  tags: []
- id: 1759148938339
  fields:
    VideoFilename: sherlok_0262.webm
    Front: Can you not keep doing this, please?
    Back: Можеш, будь ласка, припинити це робити?
  tags: []
- id: 1759148938340
  fields:
    VideoFilename: sherlok_0263.webm
    Front: Somebody's been in here before me
    Back: Хтось був тут раніше за мене.
  tags: []
- id: 1759148938341
  fields:
    VideoFilename: sherlok_0264.webm
    Front: Any time you want to include me
    Back: Коли завгодно, якщо захочеш мене долучити
  tags: []
- id: 1759148938342
  fields:
    VideoFilename: sherlok_0265.webm
    Front: When was the last time you saw her?
    Back: Коли востаннє ти її бачив?
  tags: []
- id: 1759148938343
  fields:
    VideoFilename: sherlok_0266.webm
    Front: Found something you'll like
    Back: Знайшов те, що тобі сподобається.
  tags: []
- id: 1759148938344
  fields:
    VideoFilename: sherlok_0267.webm
    Front: It's been painted over.
    Back: Це було перечеканено/перефарбовано.
  tags: []
- id: 1759148938345
  fields:
    VideoFilename: sherlok_0268.webm
    Front: Why did he paint it so near the tracks? No idea
    Back: Навіщо він пофарбував це так близько до колій? Без ідеї.
  tags: []
- id: 1759148938346
  fields:
    VideoFilename: sherlok_0269.webm
    Front: Thousands of people pass by there every day
    Back: Там проходять тисячі людей щодня.
  tags: []
- id: 1759148938347
  fields:
    VideoFilename: sherlok_0270.webm
    Front: Just twenty minutes
    Back: Усього 20 хвилин
  tags: []
- id: 1759148938348
  fields:
    VideoFilename: sherlok_0271.webm
    Front: We can't crack this without Soo Lin Yao
    Back: Ми не розв'яжемо це без Су Лін Яо.
  tags: []
- id: 1759148938349
  fields:
    VideoFilename: sherlok_0272.webm
    Front: Tell me more about those teapots
    Back: Розкажи більше про ті чайники.
  tags: []
- id: 1759148938350
  fields:
    VideoFilename: sherlok_0273.webm
    Front: Yesterday, only one of those pots was shining.
    Back: Учора тільки один із тих горщиків блищав.
  tags: []
- id: 1759148938351
  fields:
    VideoFilename: sherlok_0274.webm
    Front: You've been clever to avoid him so far.
    Back: Ти була розумний, уникаючи його й досі.
  tags: []
- id: 1759148938352
  fields:
    VideoFilename: sherlok_0275.webm
    Front: It's only a matter of time
    Back: Це лише питання часу.
  tags: []
- id: 1759148938353
  fields:
    VideoFilename: sherlok_0276.webm
    Front: Who is he? Have you met him before?
    Back: Хто він? Ти зустрічав його раніше?
  tags: []
- id: 1759148938354
  fields:
    VideoFilename: sherlok_0277.webm
    Front: Ancient crime syndicate, based in China.
    Back: Стародавній злочинний синдикат, базований у Китаї.
  tags: []
- id: 1759148938355
  fields:
    VideoFilename: sherlok_0278.webm
    Front: Every foot soldier bears the mark
    Back: Кожен рядовий носить цей знак.
  tags: []
- id: 1759148938356
  fields:
    VideoFilename: sherlok_0279.webm
    Front: Everyone who hauls for them
    Back: Кожен, хто для них тягне/перевозить вантажі.
  tags: []
- id: 1759148938357
  fields:
    VideoFilename: sherlok_0280.webm
    Front: You mean you were a smuggler?
    Back: Ти маєш на увазі, що був контрабандистом?
  tags: []
- id: 1759148938358
  fields:
    VideoFilename: sherlok_0281.webm
    Front: By the time I was sixteen
    Back: До того часу, коли мені було 16
  tags: []
- id: 1759148938359
  fields:
    VideoFilename: sherlok_0282.webm
    Front: I managed to leave that life behind me
    Back: Мені вдалося залишити те життя позаду.
  tags: []
- id: 1759148938360
  fields:
    VideoFilename: sherlok_0283.webm
    Front: I came to England
    Back: Я приїхав до Англії.
  tags: []
- id: 1759148938361
  fields:
    VideoFilename: sherlok_0284.webm
    Front: They gave me a job, here
    Back: Вони дали мені роботу тут.
  tags: []
- id: 1759148938362
  fields:
    VideoFilename: sherlok_0285.webm
    Front: And he came looking for you
    Back: І він прийшов шукати тебе.
  tags: []
- id: 1759148938363
  fields:
    VideoFilename: sherlok_0286.webm
    Front: But they never really let you leave
    Back: Але вони ніколи насправді не дозволяли йти.
  tags: []
- id: 1759148938364
  fields:
    VideoFilename: sherlok_0287.webm
    Front: They are never very far away
    Back: вони ніколи не бувають дуже далеко.
  tags: []
- id: 1759148938365
  fields:
    VideoFilename: sherlok_0288.webm
    Front: I refused to help
    Back: Я відмовилась допомогти.
  tags: []
- id: 1759148938366
  fields:
    VideoFilename: sherlok_0289.webm
    Front: We had no choice
    Back: У нас не було вибору.
  tags: []
- id: 1759148938367
  fields:
    VideoFilename: sherlok_0290.webm
    Front: My brother has become their puppet
    Back: Мій брат став їхньою маріонеткою.
  tags: []
- id: 1759148938368
  fields:
    VideoFilename: sherlok_0291.webm
    Front: I turned my brother away
    Back: Я відвернулась від мого брата.
  tags: []
- id: 1759148938369
  fields:
    VideoFilename: sherlok_0292.webm
    Front: He said I had betrayed him
    Back: Він сказав, що я його зрадив.
  tags: []
- id: 1759148938370
  fields:
    VideoFilename: sherlok_0293.webm
    Front: All the smugglers know it
    Back: Усі контрабандисти це знають.
  tags: []
- id: 1759148938371
  fields:
    VideoFilename: sherlok_0294.webm
    Front: Can you prove that?
    Back: Ти можеш це довести?
  tags: []
- id: 1759148938372
  fields:
    VideoFilename: sherlok_0295.webm
    Front: I'd stick with the pasta
    Back: я б вибрав пасту
  tags: []
- id: 1759148938373
  fields:
    VideoFilename: sherlok_0296.webm
    Front: So you&#x27;re working here tonight?
    Back: Отже, ти сьогодні тут працюєш?
  tags: []
- id: 1759148938374
  fields:
    VideoFilename: sherlok_0297.webm
    Front: Need to examine some bodies
    Back: Потрібно оглянути кілька тіл.
  tags: []
- id: 1759148938375
  fields:
    VideoFilename: sherlok_0298.webm
    Front: They're on my list
    Back: Вони у мене в списку.
  tags: []
- id: 1759148938376
  fields:
    VideoFilename: sherlok_0299.webm
    Front: Could you wheel them out again for me?
    Back: Чи не могли б ви ще раз їх вивезти для мене?
  tags: []
- id: 1759148938377
  fields:
    VideoFilename: sherlok_0300.webm
    Front: We're just interested in the feet
    Back: Нас цікавлять лише ступні.
  tags: []
- id: 1759148938378
  fields:
    VideoFilename: sherlok_0301.webm
    Front: Do you mind if we have a look at them?
    Back: Ти не проти, якщо ми їх оглянемо?
  tags: []
- id: 1759828379960
  fields:
    VideoFilename: sherlok_0302.webm
    Front: Not just a criminal organisation. It's a cult
    Back: Не просто злочинна організація. Це культ.
  tags: []
- id: 1759828379961
  fields:
    VideoFilename: sherlok_0303.webm
    Front: Her brother was corrupted by one of its leaders
    Back: Її брат був корумпований одним із їх лідерів
  tags: []
- id: 1759828379962
  fields:
    VideoFilename: sherlok_0304.webm
    Front: Soo Lin said the name
    Back: Су Лін назвала ім'я.
  tags: []
- id: 1759828379963
  fields:
    VideoFilename: sherlok_0305.webm
    Front: We've got almost all we need to know
    Back: У нас є майже все, що потрібно знати.
  tags: []
- id: 1759828379964
  fields:
    VideoFilename: sherlok_0306.webm
    Front: She gave us most of the missing pieces
    Back: Вона дала нам більшість відсутніх частин.
  tags: []
- id: 1759828379965
  fields:
    VideoFilename: sherlok_0307.webm
    Front: Why did he need to visit his sister? Why did he need her expertise?
    Back: Чому йому потрібно було відвідати сестру? Чому йому потрібна була її експертиза?
  tags: []
- id: 1759828379966
  fields:
    VideoFilename: sherlok_0308.webm
    Front: Two undiscovered treasures from the East
    Back: Два невідкриті скарби зі Сходу.
  tags: []
- id: 1759828379967
  fields:
    VideoFilename: sherlok_0309.webm
    Front: Are we collecting for charity, Sherlock? What?
    Back: Ми що, збираємо для благодійності, Шерлоку? Що?
  tags: []
- id: 1759828379968
  fields:
    VideoFilename: sherlok_0310.webm
    Front: A young man's outside with crates of books
    Back: Зовні молодий чоловік із ящиками книжок.
  tags: []
- id: 1759828379969
  fields:
    VideoFilename: sherlok_0311.webm
    Front: That's the cunning of the book code
    Back: У цьому хитрість книжкового коду.
  tags: []
- id: 1759828379970
  fields:
    VideoFilename: sherlok_0312.webm
    Front: It has to be one that they both own
    Back: Це має бути та, яка є в обох.
  tags: []
- id: 1759828379971
  fields:
    VideoFilename: sherlok_0313.webm
    Front: We found these, at the museum
    Back: Ми знайшли це, у музеї.
  tags: []
- id: 1759828379972
  fields:
    VideoFilename: sherlok_0314.webm
    Front: Anything else I can do?
    Back: Ще щось я можу зробити?
  tags: []
- id: 1759828379973
  fields:
    VideoFilename: sherlok_0315.webm
    Front: Some silence right now would be marvellous
    Back: Трохи тиші зараз було б чудово.
  tags: []
- id: 1759828379974
  fields:
    VideoFilename: sherlok_0316.webm
    Front: I'm sorry to keep you waiting, but we haven't got anything now until next Thursday
    Back: Вибачте, що змусив вас чекати, але зараз у нас нічого немає до наступного четверга.
  tags: []
- id: 1759828379975
  fields:
    VideoFilename: sherlok_0317.webm
    Front: That new doctor you hired, he hasn't buzzed the intercom for ages
    Back: Той новий лікар, якого ви найняли, давно не дзвонив у домофон.
  tags: []
- id: 1759828379976
  fields:
    VideoFilename: sherlok_0318.webm
    Front: Oh, I did one or two of yours
    Back: О, я зробив одну-дві твоїх.
  tags: []
- id: 1759828379977
  fields:
    VideoFilename: sherlok_0319.webm
    Front: Well, maybe five or six
    Back: Ну, можливо п'ять чи шість.
  tags: []
- id: 1759828379978
  fields:
    VideoFilename: sherlok_0320.webm
    Front: I had, a bit of a late one
    Back: У мене була… трохи пізня ніч.
  tags: []
- id: 1759828379979
  fields:
    VideoFilename: sherlok_0321.webm
    Front: What were you doing to keep you up so late?
    Back: Що ти робив, що так довго не лягав спати?
  tags: []
- id: 1759828379980
  fields:
    VideoFilename: sherlok_0322.webm
    Front: I was attending a sort of book event
    Back: Я відвідував щось на кшталт книжкового заходу.
  tags: []
- id: 1759828379981
  fields:
    VideoFilename: sherlok_0323.webm
    Front: A book that everybody would own
    Back: Книжка, яка була б у кожного.
  tags: []
- id: 1759828379982
  fields:
    VideoFilename: sherlok_0324.webm
    Front: Fifteen, entry one
    Back: п'ятнадцять, запис перший
  tags: []
- id: 1759828379983
  fields:
    VideoFilename: sherlok_0325.webm
    Front: That's what I was suggesting
    Back: Саме це я і пропонував.
  tags: []
- id: 1759828379984
  fields:
    VideoFilename: sherlok_0326.webm
    Front: Dull, boring, predictable
    Back: Тупо, нудно, передбачувано…
  tags: []
- id: 1759828379985
  fields:
    VideoFilename: sherlok_0327.webm
    Front: In London for one night only
    Back: У Лондоні лише на одну ніч.
  tags: []
- id: 1759828379986
  fields:
    VideoFilename: sherlok_0328.webm
    Front: Actually, I have three in that name
    Back: Власне, у мене є три на те ім'я.
  tags: []
- id: 1759828379987
  fields:
    VideoFilename: sherlok_0329.webm
    Front: No, I don't think so, we only booked two
    Back: Ні, я так не думаю, ми забронювали лише дві.
  tags: []
- id: 1759828379988
  fields:
    VideoFilename: sherlok_0330.webm
    Front: Then I phoned back and got one for myself as well
    Back: Тоді я передзвонив і взяв ще одну для себе.
  tags: []
- id: 1759828379989
  fields:
    VideoFilename: sherlok_0331.webm
    Front: She splits the sandbag, the sand pours out
    Back: Вона розрізає мішок із піском, пісок висипається.
  tags: []
- id: 1759828379990
  fields:
    VideoFilename: sherlok_0332.webm
    Front: Gradually, the weight lowers into the bowl
    Back: Поступово вага опускається в миску.
  tags: []
- id: 1759828379991
  fields:
    VideoFilename: sherlok_0333.webm
    Front: Mr Holmes, I've done everything you asked
    Back: Містере Холмс, я зробив усе, що ви просили.
  tags: []
- id: 1759828379992
  fields:
    VideoFilename: sherlok_0334.webm
    Front: Lestrade, he seems to think your advice is worth something
    Back: Лестрейде, здається, він вважає, що твоя порада чогось варта.
  tags: []
- id: 1759828379993
  fields:
    VideoFilename: sherlok_0335.webm
    Front: Somewhere in this message it must tell us
    Back: Десь у цьому повідомленні це має бути сказано.
  tags: []
- id: 1759828379994
  fields:
    VideoFilename: sherlok_0336.webm
    Front: He's kidding. Please stay if you'd like
    Back: Він жартує. Будь ласка, залишайся, якщо хочеш.
  tags: []
- id: 1759828379995
  fields:
    VideoFilename: sherlok_0337.webm
    Front: Is it just me or is anyone else starving?
    Back: Це тільки мені здається, чи хтось ще страшенно голодний?
  tags: []
- id: 1759828379996
  fields:
    VideoFilename: sherlok_0338.webm
    Front: So this is what you do
    Back: Отже, цим ви займаєтесь.
  tags: []
- id: 1759828379997
  fields:
    VideoFilename: sherlok_0339.webm
    Front: You and John, you solve puzzles for a living.
    Back: Ти і Джон — ви заробляєте на життя, розв&#x27;язуючи загадки.
  tags: []
- id: 1759828379998
  fields:
    VideoFilename: sherlok_0340.webm
    Front: So these numbers, it's a cipher?
    Back: То ці числа — це шифр?
  tags: []
- id: 1759828379999
  fields:
    VideoFilename: sherlok_0341.webm
    Front: How did you know that?
    Back: Звідки ти це знав?
  tags: []
- id: 1759828380000
  fields:
    VideoFilename: sherlok_0342.webm
    Front: Well, two words have already been translated. Here
    Back: Ну, два слова вже перекладено. Ось.
  tags: []
- id: 1759828380001
  fields:
    VideoFilename: sherlok_0343.webm
    Front: Nine million quid. For what?
    Back: Дев&#x27;ять мільйонів фунтів. За що?
  tags: []
- id: 1759828380002
  fields:
    VideoFilename: sherlok_0344.webm
    Front: Er, shall we get a takeaway?
    Back: Е-е, може замовимо щось із собою?
  tags: []
- id: 1759828380003
  fields:
    VideoFilename: sherlok_0345.webm
    Front: Do you want me to lay the table?
    Back: Хочеш, я накрию на стіл?
  tags: []
- id: 1759828380004
  fields:
    VideoFilename: sherlok_0346.webm
    Front: Do you have the treasure?
    Back: У тебе є скарб?
  tags: []
- id: 1759828380005
  fields:
    VideoFilename: sherlok_0347.webm
    Front: How would you describe me, John?
    Back: Як би ти описав мене, Джоне?
  tags: []
- id: 1759828380006
  fields:
    VideoFilename: sherlok_0348.webm
    Front: Next date won't be like this
    Back: Наступне побачення не буде таким.
  tags: []
- id: 1759828380007
  fields:
    VideoFilename: sherlok_0349.webm
    Front: We'll just slip off. No need to mention us in your report
    Back: Ми просто зникнемо. Нема потреби згадувати нас у твоєму звіті.
  tags: []
- id: 1759828380008
  fields:
    VideoFilename: sherlok_0350.webm
    Front: I go where you point me
    Back: Я йду туди, куди ти вкажеш.
  tags: []
- id: 1759828380009
  fields:
    VideoFilename: sherlok_0351.webm
    Front: A message. What they were trying to reclaim.
    Back: Повідомлення. Те, що вони намагалися повернути.
  tags: []
- id: 1759828380010
  fields:
    VideoFilename: sherlok_0352.webm
    Front: Apparently. Why so much?
    Back: Схоже, так. Чому так багато?
  tags: []
- id: 1759828380011
  fields:
    VideoFilename: sherlok_0353.webm
    Front: Depends who owned it
    Back: Залежить від того, кому воно належало.
  tags: []
- id: 1759828380012
  fields:
    VideoFilename: sherlok_0354.webm
    Front: A little gift when he came back from China
    Back: Маленький подарунок, коли він повернувся з Китаю.
  tags: []
- id: 1759828380013
  fields:
    VideoFilename: sherlok_0355.webm
    Front: Someone's been gossiping? No
    Back: Хтось пліткував.
  tags: []
- id: 1759828380014
  fields:
    VideoFilename: sherlok_0356.webm
    Front: And it&#x27;s the same brand as that hand cream there on your desk.
    Back: І це та сама марка, що й у того крему для рук на твоєму столі.
  tags: []
- id: 1759828380015
  fields:
    VideoFilename: sherlok_0357.webm
    Front: Look, it wasn't serious between us
    Back: Послухай, між нами це не було серйозним.
  tags: []
- id: 1759828380016
  fields:
    VideoFilename: sherlok_0358.webm
    Front: It was over in a flash, it couldn't last
    Back: Це закінчилося миттєво, воно не могло тривати.
  tags: []
- id: 1759828380017
  fields:
    VideoFilename: sherlok_0359.webm
    Front: Why did you end it?
    Back: Чому ти це закінчив?
  tags: []
- id: 1759828380018
  fields:
    VideoFilename: sherlok_0360.webm
    Front: I thought he didn't appreciate me
    Back: Я думала, що він мене не цінував.
  tags: []
- id: 1759828380019
  fields:
    VideoFilename: sherlok_0361.webm
    Front: Took me for granted
    Back: Сприймав мене як належне.
  tags: []
- id: 1759828380020
  fields:
    VideoFilename: sherlok_0362.webm
    Front: Stood me up once too often
    Back: Занадто часто мене підводив.
  tags: []
- id: 1759828380021
  fields:
    VideoFilename: sherlok_0363.webm
    Front: We'd plan to go away for the weekend, and then he'd just leave.
    Back: <div>Ми зазвичай планували поїхати кудись на вихідні, а потім він просто брав і йшов.</div>
  tags: []
- id: 1759828380022
  fields:
    VideoFilename: sherlok_0364.webm
    Front: Fly off to China at a moment's notice.
    Back: Полетіти в Китай у будь-який момент.
  tags: []
- id: 1759828380023
  fields:
    VideoFilename: sherlok_0365.webm
    Front: And he brought you a present from abroad to say sorry
    Back: І він привіз тобі подарунок з-за кордону, щоб вибачитися.
  tags: []
- id: 1759828380024
  fields:
    VideoFilename: sherlok_0366.webm
    Front: Can I just have a look at it?
    Back: Можу я просто на нього глянути?
  tags: []
- id: 1759828380025
  fields:
    VideoFilename: sherlok_0367.webm
    Front: He said he bought it in a street market
    Back: Він сказав, що купив це на вуличному ринку.
  tags: []
- id: 1759828380026
  fields:
    VideoFilename: sherlok_0368.webm
    Front: Oh, I don't think that's true. I think he pinched it
    Back: О, я не думаю, що це правда. Думаю, він це поцупив.
  tags: []
- id: 1759828380027
  fields:
    VideoFilename: sherlok_0369.webm
    Front: Didn't know its value, just thought it would suit you
    Back: Не знав його справжньої цінності, просто думав, що воно тобі підійде.
  tags: []
- id: 1759828380028
  fields:
    VideoFilename: sherlok_0370.webm
    Front: What&#x27;s it worth?
    Back: Скільки це коштує?
  tags: []
- id: 1759828380029
  fields:
    VideoFilename: sherlok_0371.webm
    Front: Nine million pounds
    Back: 9 мільйонів фунтів.
  tags: []
- id: 1759828380030
  fields:
    VideoFilename: sherlok_0372.webm
    Front: Over a thousand years old
    Back: Більше тисячі років.
  tags: []
- id: 1759828380031
  fields:
    VideoFilename: sherlok_0373.webm
    Front: You mind, don&#x27;t you?
    Back: Ти ж проти, правда?
  tags: []
- id: 1759828380032
  fields:
    VideoFilename: sherlok_0374.webm
    Front: You cracked the code, though
    Back: Але ти ж таки зламав код.
  tags: []
- id: 1761528152651
  fields:
    VideoFilename: sherlok_0375.webm
    Front: Just tell me what happened from the beginning
    Back: Просто розкажи, що сталося з самого початку.
  tags: []
- id: 1761528152652
  fields:
    VideoFilename: sherlok_0376.webm
    Front: Did it. Did it! Stabbed her
    Back: Зробив це. Зробив! Ударив її ножем.
  tags: []
- id: 1761528152653
  fields:
    VideoFilename: sherlok_0377.webm
    Front: What the hell are you doing?
    Back: Що, до біса, ти робиш?
  tags: []
- id: 1761528152654
  fields:
    VideoFilename: sherlok_0378.webm
    Front: So you take it out on the wall?
    Back: То ти зриваєш злість на стіні?
  tags: []
- id: 1761528152655
  fields:
    VideoFilename: sherlok_0379.webm
    Front: Anything in? I'm starving
    Back: Є щось поїсти? Я страшенно голодний.
  tags: []
- id: 1761528152656
  fields:
    VideoFilename: sherlok_0380.webm
    Front: Why not? I thought you&#x27;d be flattered.
    Back: Чому ні? Я думав, ти будеш польщений.
  tags: []
- id: 1761528152657
  fields:
    VideoFilename: sherlok_0381.webm
    Front: Whether the Earth goes around the Sun.
    Back: Чи обертається Земля навколо Сонця.
  tags: []
- id: 1761528152658
  fields:
    VideoFilename: sherlok_0382.webm
    Front: It's primary school stuff
    Back: Це ж матеріал початкової школи.
  tags: []
- id: 1761528152659
  fields:
    VideoFilename: sherlok_0383.webm
    Front: How can you not know that?
    Back: Як ти можеш цього не знати?
  tags: []
- id: 1761528152660
  fields:
    VideoFilename: sherlok_0384.webm
    Front: Ordinary people fill their heads with all kinds of rubbish.
    Back: Звичайні люди наповнюють свої голови всяким мотлохом.
  tags: []
- id: 1761528152661
  fields:
    VideoFilename: sherlok_0385.webm
    Front: All that matters to me is the work!
    Back: Єдине, що для мене важливо — це робота!
  tags: []
- id: 1761528152662
  fields:
    VideoFilename: sherlok_0386.webm
    Front: Without that, my brain rots!
    Back: Без цього мій мозок гниє!
  tags: []
- id: 1761528152663
  fields:
    VideoFilename: sherlok_0387.webm
    Front: Where are you going? Out! I need some air
    Back: Куди ти йдеш? Надвір! Мені треба свіже повітря.
  tags: []
- id: 1761528152664
  fields:
    VideoFilename: sherlok_0388.webm
    Front: Oh, sorry, love!
    Back: Ой, вибач, люба!
  tags: []
- id: 1761528152665
  fields:
    VideoFilename: sherlok_0389.webm
    Front: You two had a little domestic?
    Back: У вас двох маленька сімейна сварка?
  tags: []
- id: 1761528152666
  fields:
    VideoFilename: sherlok_0390.webm
    Front: He should have wrapped himself up a bit more
    Back: Йому слід було краще закутатись.
  tags: []
- id: 1761528152667
  fields:
    VideoFilename: sherlok_0391.webm
    Front: Isn&#x27;t it hateful?
    Back: Хіба це не огидно?
  tags: []
- id: 1761528152668
  fields:
    VideoFilename: sherlok_0392.webm
    Front: Oh, I'm sure something will turn up, Sherlock
    Back: О, я впевнений, що щось з'явиться, Шерлоку.
  tags: []
- id: 1761528152669
  fields:
    VideoFilename: sherlok_0393.webm
    Front: A nice murder. That'll cheer you up
    Back: Якесь гарне вбивство — це тебе підбадьорить.
  tags: []
- id: 1761528152670
  fields:
    VideoFilename: sherlok_0394.webm
    Front: What have you done to my bloody wall?
    Back: Що ти зробив із моєю клятою стіною?
  tags: []
- id: 1761528152671
  fields:
    VideoFilename: sherlok_0395.webm
    Front: I&#x27;m putting this on your rent, young man!
    Back: Я додам це до твоєї оренди, молодий чоловіче!
  tags: []
- id: 1761528152672
  fields:
    VideoFilename: sherlok_0396.webm
    Front: There's been a massive explosion in central London
    Back: У центрі Лондона стався потужний вибух.
  tags: []
- id: 1761528152673
  fields:
    VideoFilename: sherlok_0397.webm
    Front: I saw it on the telly. Are you OK?
    Back: Я бачив це по телевізору. Ти в порядку?
  tags: []
- id: 1761528152674
  fields:
    VideoFilename: sherlok_0398.webm
    Front: Never mind your usual trivia
    Back: Не звертай уваги на свої звичні дрібниці.
  tags: []
- id: 1761528152675
  fields:
    VideoFilename: sherlok_0399.webm
    Front: This is of national importance
    Back: Це питання національного значення.
  tags: []
- id: 1761528152676
  fields:
    VideoFilename: sherlok_0400.webm
    Front: Perhaps you can get through to him, John
    Back: Може, ти зможеш достукатись до нього, Джоне.
  tags: []
- id: 1761528152677
  fields:
    VideoFilename: sherlok_0401.webm
    Front: I'm afraid my brother can be very intransigent
    Back: Боюсь, мій брат може бути дуже безкомпромісним.
  tags: []
- id: 1761528152678
  fields:
    VideoFilename: sherlok_0402.webm
    Front: If you&#x27;re so keen, why don&#x27;t you investigate it?
    Back: Якщо ти такий зацікавлений, чому не розслідуєш це сам?
  tags: []
- id: 1761528152679
  fields:
    VideoFilename: sherlok_0403.webm
    Front: Well, you don&#x27;t need to know about that, do you?
    Back: Ну, тобі ж не обов&#x27;язково про це знати, правда?
  tags: []
- id: 1761528152680
  fields:
    VideoFilename: sherlok_0404.webm
    Front: Besides, a case like this, it requires
    Back: До того ж, справа такого рівня вимагає…
  tags: []
- id: 1761528152681
  fields:
    VideoFilename: sherlok_0405.webm
    Front: Sherlock&#x27;s business seems to be booming since you and he became
    Back: Справи Шерлока, здається, процвітають відтоді, як ви з ним стали…
  tags: []
- id: 1761528152682
  fields:
    VideoFilename: sherlok_0406.webm
    Front: I'm never bored
    Back: Мені ніколи не буває нудно.
  tags: []
- id: 1761528152683
  fields:
    VideoFilename: sherlok_0407.webm
    Front: Good. That&#x27;s good, isn&#x27;t it?
    Back: Добре. Це ж добре, правда?
  tags: []
- id: 1761528152684
  fields:
    VideoFilename: sherlok_0408.webm
    Front: Seems the logical assumption
    Back: Здається, логічне припущення.
  tags: []
- id: 1761528152685
  fields:
    VideoFilename: sherlok_0409.webm
    Front: Well, you wouldn't be here if it was just an accident
    Back: Ну, ти б не був тут, якби це була просто випадковість.
  tags: []
- id: 1761528152686
  fields:
    VideoFilename: sherlok_0410.webm
    Front: The plans for it were on a memory stick
    Back: Плани цього були на флешці.
  tags: []
- id: 1761528152687
  fields:
    VideoFilename: sherlok_0411.webm
    Front: That wasn't very clever
    Back: Це було не надто розумно.
  tags: []
- id: 1761528152688
  fields:
    VideoFilename: sherlok_0412.webm
    Front: We can't possibly risk it falling into the wrong hands.
    Back: Ми не можемо ризикувати, що воно потрапить не в ті руки.
  tags: []
- id: 1761528152689
  fields:
    VideoFilename: sherlok_0413.webm
    Front: You've got to find those plans, Sherlock
    Back: Ти повинен знайти ті плани, Шерлоку.
  tags: []
- id: 1761528152690
  fields:
    VideoFilename: sherlok_0414.webm
    Front: Don't make me order you
    Back: Не змушуй мене віддавати наказ.
  tags: []
- id: 1761528152691
  fields:
    VideoFilename: sherlok_0415.webm
    Front: I'd like to see you try
    Back: Хотів би я побачити, як ти спробуєш.
  tags: []
- id: 1761528152692
  fields:
    VideoFilename: sherlok_0416.webm
    Front: Think it over
    Back: Добре обміркуй.
  tags: []
- id: 1761528152693
  fields:
    VideoFilename: sherlok_0417.webm
    Front: Why did you lie?
    Back: Чому ти збрехав?
  tags: []
- id: 1761528152694
  fields:
    VideoFilename: sherlok_0418.webm
    Front: You've got nothing on
    Back: У тебе немає жодної справи.
  tags: []
- id: 1761528152695
  fields:
    VideoFilename: sherlok_0419.webm
    Front: Not a single case
    Back: Жодної справи
  tags: []
- id: 1761528152696
  fields:
    VideoFilename: sherlok_0420.webm
    Front: Sibling rivalry. Now we&#x27;re getting somewhere.
    Back: Братське суперництво. Тепер ми кудись рухаємось.
  tags: []
- id: 1761528152697
  fields:
    VideoFilename: sherlok_0421.webm
    Front: Of course. How could I refuse?
    Back: Звісно. Як я міг відмовитись?
  tags: []
- id: 1761528152698
  fields:
    VideoFilename: sherlok_0422.webm
    Front: Lestrade - I&#x27;ve been summoned. Coming?
    Back: Лестрейд — мене викликали. Ідеш?
  tags: []
- id: 1761528152699
  fields:
    VideoFilename: sherlok_0423.webm
    Front: I'd be lost without my blogger
    Back: Я б пропав без свого блогера.
  tags: []
- id: 1761528152700
  fields:
    VideoFilename: sherlok_0424.webm
    Front: You like the funny cases, don&#x27;t you?
    Back: Тобі подобаються дивні справи, правда?
  tags: []
- id: 1761528152701
  fields:
    VideoFilename: sherlok_0425.webm
    Front: That explosion. Gas leak, yes? No
    Back: Той вибух. Витік газу, так? Ні.
  tags: []
- id: 1761528152702
  fields:
    VideoFilename: sherlok_0426.webm
    Front: No. Made to look like one. What?
    Back: Ні. Його зробили схожим на витік газу. Що?
  tags: []
- id: 1761528152703
  fields:
    VideoFilename: sherlok_0427.webm
    Front: It&#x27;s addressed to you, isn&#x27;t it?
    Back: Це ж адресовано тобі, правда?
  tags: []
- id: 1761528152704
  fields:
    VideoFilename: sherlok_0428.webm
    Front: From the Czech Republic. No fingerprints?
    Back: З Чехії. Без відбитків пальців?
  tags: []
- id: 1761528152705
  fields:
    VideoFilename: sherlok_0429.webm
    Front: Do you really not know that the Earth goes round the Sun?
    Back: Ти справді не знаєш, що Земля обертається навколо Сонця?
  tags: []
- id: 1761528152706
  fields:
    VideoFilename: sherlok_0430.webm
    Front: It isn't the same phone
    Back: Це не той самий телефон.
  tags: []
- id: 1761528152707
  fields:
    VideoFilename: sherlok_0431.webm
    Front: This one's brand-new
    Back: Цей — зовсім новий.
  tags: []
- id: 1761528152708
  fields:
    VideoFilename: sherlok_0432.webm
    Front: Which means your blog has a far wider readership
    Back: що означає, що твій блог має набагато ширшу аудиторію.
  tags: []
- id: 1761528152709
  fields:
    VideoFilename: sherlok_0433.webm
    Front: You have one new message
    Back: У тебе одне нове повідомлення.
  tags: []
- id: 1762522397833
  fields:
    VideoFilename: sherlok_0434.webm
    Front: What the hell are we supposed to make of that?
    Back: Що, до біса, ми маємо з цього зрозуміти?
  tags: []
- id: 1762522397834
  fields:
    VideoFilename: sherlok_0435.webm
    Front: An estate agent's photo and the bloody Greenwich pips
    Back: Фото від рієлтора і кляті Ґрінвічські сигнали часу.
  tags: []
- id: 1762522397835
  fields:
    VideoFilename: sherlok_0436.webm
    Front: It&#x27;s a warning. A warning?
    Back: Це попередження. Попередження?
  tags: []
- id: 1762522397836
  fields:
    VideoFilename: sherlok_0437.webm
    Front: They're warning us it's gonna happen again.
    Back: Вони попереджають, що це станеться знову.
  tags: []
- id: 1762522397837
  fields:
    VideoFilename: sherlok_0438.webm
    Front: I've seen this place before. Hang on
    Back: Я вже бачив це місце. Зачекай.
  tags: []
- id: 1762522397838
  fields:
    VideoFilename: sherlok_0439.webm
    Front: The door's been opened, recently
    Back: Двері недавно відкривали.
  tags: []
- id: 1762522397839
  fields:
    VideoFilename: sherlok_0440.webm
    Front: I can't get anyone interested in this flat
    Back: Я не можу знайти нікого, кого зацікавила б ця квартира.
  tags: []
- id: 1762522397840
  fields:
    VideoFilename: sherlok_0441.webm
    Front: I&#x27;ve sent you a little puzzle
    Back: Я надіслав тобі маленьку загадку.
  tags: []
- id: 1762522397841
  fields:
    VideoFilename: sherlok_0442.webm
    Front: Who&#x27;s talking? Why are you crying?
    Back: Хто говорить? Чому ти плачеш?
  tags: []
- id: 1762522397842
  fields:
    VideoFilename: sherlok_0443.webm
    Front: I've been expecting this for some time
    Back: Я цього чекав уже деякий час.
  tags: []
- id: 1762522397843
  fields:
    VideoFilename: sherlok_0444.webm
    Front: Twelve hours to solve
    Back: 12 годин, щоб розв'язати.
  tags: []
- id: 1762522397844
  fields:
    VideoFilename: sherlok_0445.webm
    Front: So, who do you suppose it was?
    Back: То як ти думаєш, хто це був?
  tags: []
- id: 1762522397845
  fields:
    VideoFilename: sherlok_0446.webm
    Front: Oh, she doesn&#x27;t matter, she&#x27;s just a hostage. No lead there.
    Back: О, вона не має значення, вона просто заручниця. Жодної зачіпки.
  tags: []
- id: 1762522397846
  fields:
    VideoFilename: sherlok_0447.webm
    Front: Jim works in IT, upstairs
    Back: Джим працює в IT, нагорі.
  tags: []
- id: 1762522397847
  fields:
    VideoFilename: sherlok_0448.webm
    Front: That's how we met. Office romance
    Back: Так ми й познайомилися. Офісний роман.
  tags: []
- id: 1762522397848
  fields:
    VideoFilename: sherlok_0449.webm
    Front: Well, I'd better be off
    Back: Ну, мені краще йти.
  tags: []
- id: 1762522397849
  fields:
    VideoFilename: sherlok_0450.webm
    Front: I'll see you at the Fox. About sixish? Yeah
    Back: Побачимось у “Фоксі”. Десь о шостій? Так.
  tags: []
- id: 1762522397850
  fields:
    VideoFilename: sherlok_0451.webm
    Front: What do you mean, gay? We're together
    Back: Що значить — гей? Ми разом.
  tags: []
- id: 1762522397851
  fields:
    VideoFilename: sherlok_0452.webm
    Front: With that level of personal grooming?
    Back: З таким рівнем догляду?
  tags: []
- id: 1762522397852
  fields:
    VideoFilename: sherlok_0453.webm
    Front: Charming, well done
    Back: Чудово, добре зроблено.
  tags: []
- id: 1762522397853
  fields:
    VideoFilename: sherlok_0454.webm
    Front: Just saving her time. Isn&#x27;t that kinder?
    Back: Просто зекономив їй час. Хіба це не добріше?
  tags: []
- id: 1762522397854
  fields:
    VideoFilename: sherlok_0455.webm
    Front: Er, very '80s. Probably one of those retro designs
    Back: Е-е, дуже у стилі 80-х. Мабуть, якийсь ретродизайн.
  tags: []
- id: 1762522397855
  fields:
    VideoFilename: sherlok_0456.webm
    Front: You&#x27;re on sparkling form. What else?
    Back: Ти сьогодні у блискучій формі. Що ще?
  tags: []
- id: 1762522397856
  fields:
    VideoFilename: sherlok_0457.webm
    Front: I mean, you missed almost everything of importance, but, you know
    Back: Я маю на увазі, ти пропустив майже все важливе, але все ж…
  tags: []
- id: 1762522397857
  fields:
    VideoFilename: sherlok_0458.webm
    Front: There's still mud on them. They look new
    Back: На них досі бруд. Виглядають новими.
  tags: []
- id: 1762522397858
  fields:
    VideoFilename: sherlok_0459.webm
    Front: Someone's kept them that way
    Back: Хтось підтримував їх у такому стані.
  tags: []
- id: 1762522397859
  fields:
    VideoFilename: sherlok_0460.webm
    Front: Something fishy about it?
    Back: Щось тут підозріле?
  tags: []
- id: 1762522397860
  fields:
    VideoFilename: sherlok_0461.webm
    Front: Nobody thought so.
    Back: Ніхто так не подумав.
  tags: []
- id: 1762522397861
  fields:
    VideoFilename: sherlok_0462.webm
    Front: He&#x27;d left all the rest of his clothes in his locker
    Back: Він залишив усі решта речей у своєму шкафчику.
  tags: []
- id: 1762522397862
  fields:
    VideoFilename: sherlok_0463.webm
    Front: Look, he did say, national importance
    Back: Послухай, він же сказав — національного значення.
  tags: []
- id: 1762522397863
  fields:
    VideoFilename: sherlok_0464.webm
    Front: Twenty-seven. Clerk at Vauxhall Cross. MI6
    Back: 27 років. Клерк у Воксхол-Крос. МІ6.
  tags: []
- id: 1762522397864
  fields:
    VideoFilename: sherlok_0465.webm
    Front: Last seen by his fiancee at ten thirty yesterday evening
    Back: Востаннє його бачила наречена о пів на одинадцяту вчора ввечері
  tags: []
- id: 1762522397865
  fields:
    VideoFilename: sherlok_0466.webm
    Front: Lucy, love, I've got to go out
    Back: Люсі, люба, мені треба вийти.
  tags: []
- id: 1762522397866
  fields:
    VideoFilename: sherlok_0467.webm
    Front: How&#x27;s he getting on?
    Back: Як у нього справи?
  tags: []
- id: 1762522397867
  fields:
    VideoFilename: sherlok_0468.webm
    Front: He's completely focused on it
    Back: Він повністю зосереджений на цьому.
  tags: []
- id: 1762522397868
  fields:
    VideoFilename: sherlok_0469.webm
    Front: It&#x27;s one of the deadliest poisons on the planet.
    Back: Це одна з найсмертоносніших отрут на планеті.
  tags: []
- id: 1762522397869
  fields:
    VideoFilename: sherlok_0470.webm
    Front: Remember the shoelaces?
    Back: Пам&#x27;ятаєш шнурки?
  tags: []
- id: 1762522397870
  fields:
    VideoFilename: sherlok_0471.webm
    Front: That&#x27;s why they had to go.
    Back: Ось чому вони мали піти.
  tags: []
- id: 1762522397871
  fields:
    VideoFilename: sherlok_0472.webm
    Front: The killer kept the shoes all these years
    Back: Убивця зберігав ті черевики всі ці роки.
  tags: []
- id: 1762522397872
  fields:
    VideoFilename: sherlok_0473.webm
    Front: But if she deviated by one word, the sniper would set her off
    Back: Якби вона відхилилась хоча б на одне слово, снайпер натиснув би спуск.
  tags: []
- id: 1762522397873
  fields:
    VideoFilename: sherlok_0474.webm
    Front: Or if you hadn't solved the case
    Back: Або якби ти не розкрив справу.
  tags: []
- id: 1762522397874
  fields:
    VideoFilename: sherlok_0475.webm
    Front: What was the point? Why would anyone do this?
    Back: У чому сенс? Навіщо комусь це робити?
  tags: []
- id: 1762522397875
  fields:
    VideoFilename: sherlok_0476.webm
    Front: I can&#x27;t be the only person in the world that gets bored.
    Back: Не може ж бути, що я єдина людина у світі, якій нудно.
  tags: []
- id: 1762522397876
  fields:
    VideoFilename: sherlok_0477.webm
    Front: Four pips
    Back: Чотири сигнали.
  tags: []
- id: 1762522397877
  fields:
    VideoFilename: sherlok_0478.webm
    Front: First test passed, it would seem. Here's the second
    Back: <div>Перший тест пройдено, здається. Ось другий.</div>
  tags: []
- id: 1762522397878
  fields:
    VideoFilename: sherlok_0479.webm
    Front: It&#x27;s abandoned, wouldn&#x27;t you say?
    Back: Воно покинуте, хіба не так?
  tags: []
- id: 1762522397879
  fields:
    VideoFilename: sherlok_0480.webm
    Front: It's ok that you've gone to the police
    Back: Нічого, що ти звернувся до поліції.
  tags: []
- id: 1762522397880
  fields:
    VideoFilename: sherlok_0481.webm
    Front: But don't rely on them
    Back: Але не покладайся на них.
  tags: []
- id: 1762522397881
  fields:
    VideoFilename: sherlok_0482.webm
    Front: So I stopped him laughing
    Back: 'тож я змусив його замовкнути (буквально: «зупинив його сміх»).'
  tags: []
- id: 1762522397882
  fields:
    VideoFilename: sherlok_0483.webm
    Front: You&#x27;ve stolen another voice, I presume.
    Back: Ти вкрав ще один голос, я так розумію.
  tags: []
- id: 1762522397883
  fields:
    VideoFilename: sherlok_0484.webm
    Front: This time you have eight
    Back: Цього разу у тебе вісім.
  tags: []
- id: 1762522397884
  fields:
    VideoFilename: sherlok_0485.webm
    Front: We've found it
    Back: Ми це знайшли.
  tags: []
- id: 1763398293133
  fields:
    VideoFilename: sherlok_0486.webm
    Front: The car was hired yesterday morning by Ian Monkford
    Back: Автомобіль учора вранці орендував якийсь Ієн Монкфорд.
  tags: []
- id: 1763398293134
  fields:
    VideoFilename: sherlok_0487.webm
    Front: Before you ask, yes, it's Monkford's blood. DNA checks out
    Back: Перш ніж ти запитаєш — так, це кров Монкфорда. ДНК підтверджено.
  tags: []
- id: 1763398293135
  fields:
    VideoFilename: sherlok_0488.webm
    Front: Very old friend of your husband's
    Back: Дуже давній друг вашого чоловіка.
  tags: []
- id: 1763398293136
  fields:
    VideoFilename: sherlok_0489.webm
    Front: We grew up together
    Back: Ми виросли разом.
  tags: []
- id: 1763398293137
  fields:
    VideoFilename: sherlok_0490.webm
    Front: Sorry… My husband has been depressed for months
    Back: Вибачте… Мій чоловік уже кілька місяців у депресії.
  tags: []
- id: 1763398293138
  fields:
    VideoFilename: sherlok_0491.webm
    Front: Really strange that he hired a car
    Back: Дуже дивно, що він орендував машину.
  tags: []
- id: 1763398293139
  fields:
    VideoFilename: sherlok_0492.webm
    Front: Why did you lie to her?
    Back: Чому ти збрехав їй?
  tags: []
- id: 1763398293140
  fields:
    VideoFilename: sherlok_0493.webm
    Front: Can't see how I can help you gentlemen
    Back: Не розумію, чим я можу допомогти вам, панове.
  tags: []
- id: 1763398293141
  fields:
    VideoFilename: sherlok_0494.webm
    Front: Mr Monkford hired the car from you yesterday
    Back: Містер Монкфорд учора орендував у вас автомобіль.
  tags: []
- id: 1763398293142
  fields:
    VideoFilename: sherlok_0495.webm
    Front: Mazda RX8. Wouldn&#x27;t mind one of them myself.
    Back: Mazda RX8. Я б і сам не відмовився від такої.
  tags: []
- id: 1763398293143
  fields:
    VideoFilename: sherlok_0496.webm
    Front: Yeah I can see you're not a car man?
    Back: Бачу, ти не розбираєшся в машинах?
  tags: []
- id: 1763398293144
  fields:
    VideoFilename: sherlok_0497.webm
    Front: But surely you can afford one - a Mazda, I mean
    Back: Але ж ти точно можеш собі дозволити одну — маю на увазі Mazda.
  tags: []
- id: 1763398293145
  fields:
    VideoFilename: sherlok_0498.webm
    Front: You didn't know Mr Monkford
    Back: Ти не знав містера Монкфорда.
  tags: []
- id: 1763398293146
  fields:
    VideoFilename: sherlok_0499.webm
    Front: No, he was just a client
    Back: Ні, він був лише клієнтом.
  tags: []
- id: 1763398293147
  fields:
    VideoFilename: sherlok_0500.webm
    Front: He came in here and hired one of my cars
    Back: Він прийшов сюди й орендував одну з моїх машин.
  tags: []
- id: 1763398293148
  fields:
    VideoFilename: sherlok_0501.webm
    Front: You&#x27;ve been away, haven&#x27;t you?
    Back: Ти був у від&#x27;їзді, так?
  tags: []
- id: 1763398293149
  fields:
    VideoFilename: sherlok_0502.webm
    Front: Have you got any change for the cigarette machine?
    Back: У тебе є дрібні для автомата з сигаретами?
  tags: []
- id: 1763398293150
  fields:
    VideoFilename: sherlok_0503.webm
    Front: I noticed one on the way in and I haven't got any change. I'm gasping
    Back: Я помітив один на вході, а в мене немає решти. Я задихаюся.
  tags: []
- id: 1763398293151
  fields:
    VideoFilename: sherlok_0504.webm
    Front: You've been very helpful
    Back: Ти був дуже корисним.
  tags: []
- id: 1763398293152
  fields:
    VideoFilename: sherlok_0505.webm
    Front: I needed to look inside his wallet
    Back: Мені треба було зазирнути до його гаманця.
  tags: []
- id: 1763398293153
  fields:
    VideoFilename: sherlok_0506.webm
    Front: Why would you be giving me a clue?
    Back: Навіщо ти даєш мені підказку?
  tags: []
- id: 1763398293154
  fields:
    VideoFilename: sherlok_0507.webm
    Front: Why does anyone do anything?
    Back: Чому люди взагалі щось роблять?
  tags: []
- id: 1763398293155
  fields:
    VideoFilename: sherlok_0508.webm
    Front: We were made for each other, Sherlock
    Back: Ми створені одне для одного, Шерлоку.
  tags: []
- id: 1763398293156
  fields:
    VideoFilename: sherlok_0509.webm
    Front: Patience
    Back: Терпіння.
  tags: []
- id: 1763398293157
  fields:
    VideoFilename: sherlok_0510.webm
    Front: How much blood was on that seat, would you say?
    Back: Скільки крові було на тому сидінні, як ви гадаєте?
  tags: []
- id: 1763398293158
  fields:
    VideoFilename: sherlok_0511.webm
    Front: How much? About a pint
    Back: Скільки? Близько пінти.
  tags: []
- id: 1763398293159
  fields:
    VideoFilename: sherlok_0512.webm
    Front: Exactly a pint. That was their first mistake
    Back: Рівно пінта. Це була їхня перша помилка.
  tags: []
- id: 1763398293160
  fields:
    VideoFilename: sherlok_0513.webm
    Front: Blood's definitely Ian Monkford's, but it's been frozen
    Back: Це кров Ієна Монкфорда, але її заморозили.
  tags: []
- id: 1763398293161
  fields:
    VideoFilename: sherlok_0514.webm
    Front: The god with two faces? Exactly
    Back: Бог із двома обличчями? Саме так.
  tags: []
- id: 1763398293162
  fields:
    VideoFilename: sherlok_0515.webm
    Front: Oh, yes. She's in on it too
    Back: О так. Вона теж у цій справі.
  tags: []
- id: 1763398293163
  fields:
    VideoFilename: sherlok_0516.webm
    Front: I am on fire!
    Back: Я просто в ударі!
  tags: []
- id: 1763398293164
  fields:
    VideoFilename: sherlok_0517.webm
    Front: You can come and fetch me
    Back: Можеш приїхати й забрати мене.
  tags: []
- id: 1763398293165
  fields:
    VideoFilename: sherlok_0518.webm
    Front: That could be anybody
    Back: Це може бути хто завгодно.
  tags: []
- id: 1763398293166
  fields:
    VideoFilename: sherlok_0519.webm
    Front: Very popular. She was going places.
    Back: Дуже популярна. Вона мала великі перспективи.
  tags: []
- id: 1763398293167
  fields:
    VideoFilename: sherlok_0520.webm
    Front: Something's wrong with this picture
    Back: Щось у цій картині не так.
  tags: []
- id: 1763398293168
  fields:
    VideoFilename: sherlok_0521.webm
    Front: How long would the bacteria have been incubating inside her?
    Back: Як довго бактерія могла розмножуватися в її організмі?
  tags: []
- id: 1763398293169
  fields:
    VideoFilename: sherlok_0522.webm
    Front: Yes. Why is he doing this - the bomber?
    Back: Так. Чому він це робить — цей бомбіст?
  tags: []
- id: 1763398293170
  fields:
    VideoFilename: sherlok_0523.webm
    Front: If this woman&#x27;s death was suspicious, why point it up?
    Back: Якщо смерть цієї жінки була підозрілою, навіщо звертати на неї увагу?
  tags: []
- id: 1763398293171
  fields:
    VideoFilename: sherlok_0524.webm
    Front: What are we dealing with?
    Back: З чим ми маємо справу?
  tags: []
- id: 1763398293172
  fields:
    VideoFilename: sherlok_0525.webm
    Front: What&#x27;s he doing? Working his way round the world, showing off?
    Back: Що він робить? Об&#x27;їжджає світ і вихваляється?
  tags: []
- id: 1763398293173
  fields:
    VideoFilename: sherlok_0526.webm
    Front: We're devastated, of course we are
    Back: Ми спустошені, звичайно, що так.
  tags: []
- id: 1763398293174
  fields:
    VideoFilename: sherlok_0527.webm
    Front: I don't think I could have managed
    Back: Не думаю, що я б таке пережила.
  tags: []
- id: 1763398293175
  fields:
    VideoFilename: sherlok_0528.webm
    Front: We didn&#x27;t always see eye to eye
    Back: Ми не завжди погоджувалися.
  tags: []
- id: 1763398293176
  fields:
    VideoFilename: sherlok_0529.webm
    Front: But my sister was very dear to me
    Back: але моя сестра була мені дуже дорога.
  tags: []
- id: 1763398293177
  fields:
    VideoFilename: sherlok_0530.webm
    Front: Oh, she was adored
    Back: О, її обожнювали.
  tags: []
- id: 1763747130141
  fields:
    VideoFilename: sherlok_0531.webm
    Front: It's a real shame. I liked her
    Back: Дуже шкода. Вона мені подобалась.
  tags: []
- id: 1763747130143
  fields:
    VideoFilename: sherlok_0532.webm
    Front: You know, what goes best with what
    Back: Ну знаєш, що з чим найкраще пасує.
  tags: []
- id: 1763747130144
  fields:
    VideoFilename: sherlok_0533.webm
    Front: I should never wear cerise, apparently
    Back: Мені, виявляється, ніколи не слід носити малиновий.
  tags: []
- id: 1763747130145
  fields:
    VideoFilename: sherlok_0534.webm
    Front: Did you ever see her show? Not until now
    Back: Ти колись бачив її шоу? — Ні, аж до зараз.
  tags: []
- id: 1763747130146
  fields:
    VideoFilename: sherlok_0535.webm
    Front: Rained every day but one
    Back: Ага, дощило щодня, окрім одного дня.
  tags: []
- id: 1763747130147
  fields:
    VideoFilename: sherlok_0536.webm
    Front: It's more common than people think
    Back: Це більш поширене, ніж люди думають.
  tags: []
- id: 1763747130148
  fields:
    VideoFilename: sherlok_0537.webm
    Front: I don't know what I'm going to do now. Right
    Back: Я не знаю, що мені тепер робити. Гаразд.
  tags: []
- id: 1763747130149
  fields:
    VideoFilename: sherlok_0538.webm
    Front: I mean, she&#x27;s left me this place
    Back: Я маю на увазі, вона залишила мені це місце.
  tags: []
- id: 1763747130150
  fields:
    VideoFilename: sherlok_0539.webm
    Front: A scratch is almost inevitable
    Back: Подряпина майже неминуча.
  tags: []
- id: 1763747130151
  fields:
    VideoFilename: sherlok_0540.webm
    Front: It was revenge
    Back: Це була помста.
  tags: []
- id: 1763747130152
  fields:
    VideoFilename: sherlok_0541.webm
    Front: He killed the old lady because she started to describe him
    Back: Він убив стареньку, бо вона почала його описувати.
  tags: []
- id: 1763747130153
  fields:
    VideoFilename: sherlok_0542.webm
    Front: I think he wants to be distracted
    Back: Думаю, він хоче відволіктись.
  tags: []
- id: 1763747130154
  fields:
    VideoFilename: sherlok_0543.webm
    Front: I've disappointed you
    Back: Я тебе розчарував.
  tags: []
- id: 1763747130155
  fields:
    VideoFilename: sherlok_0544.webm
    Front: It&#x27;s me. Have you found anything on the South Bank between Waterloo Bridge and Southwark
      Bridge?
    Back: Це я. Знайшов щось на Саут-Бенку між мостами Ватерлоо і Саутварк?
  tags: []
- id: 1763747130156
  fields:
    VideoFilename: sherlok_0545.webm
    Front: Do you reckon this is connected, then, the bomber?
